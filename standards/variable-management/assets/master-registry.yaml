# =============================================================================
# INFRASTRUCTURE SCENARIO TAXONOMY
# =============================================================================
# Defines which variable groups are required for each infrastructure deployment
# type. Used by Generate-Infrastructure.ps1 to filter variables based on flags.
#
# Usage:
#   .\Generate-Infrastructure.ps1 -Environment iic-production -azure_local -avd_azure_local
#   → Generates infrastructure.yml with only azure_local + avd_azure_local + shared variables
#
# No flags specified = complete registry (all 910+ variables) - backward compatible
# =============================================================================

infrastructure_scenarios:
  # ---------------------------------------------------------------------------
  # SHARED VARIABLE GROUPS (Always Included)
  # ---------------------------------------------------------------------------
  # These are automatically included with ANY infrastructure flag
  shared_groups:
    - azure_tenants         # Tenant, subscription, service principals
    - management_groups     # Management group hierarchy
    - subscriptions         # Subscription configuration
    - resource_groups       # Resource groups, locations, tags
    - hub_spoke_networking  # VNets, subnets, NSGs, hub-spoke
    - azure_vnets           # Virtual network configuration
    - vpn                   # VPN gateway configuration
    - bastion               # Azure Bastion configuration
    - azure_firewall        # Azure Firewall configuration
    - monitoring            # Log Analytics, Azure Monitor, Application Insights
    - keyvault              # Key Vault configurations (CMP platform and per-tenant)
    - active_directory      # AD DS domain integration
    - policy                # Azure Policy assignments
    - defender              # Defender for Cloud
    - bcdr_backup_recovery  # Recovery Services, backup policies
    - storage               # Storage accounts
    - azure_vms             # Management VMs (DCs, Jumpbox, WAC, Lighthouse, Syslog)
    - accounts              # Service accounts and credentials
    - environment           # Environment configuration
    - site                  # Site configuration
    - tags                  # Resource tagging standards
  
  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE TYPES
  # ---------------------------------------------------------------------------
  infrastructure_types:
    azure_local:
      description: "Azure Local (formerly Azure Stack HCI) cluster"
      variable_groups:
        - clusters
        - cluster_nodes
        - network_intents
        - logical_networks
        - vlans
        - dhcp
        - cluster_arm_deployment
      conflicts_with:
        - wsfc_s2d
        - wsfc_san
      estimated_variables: "250-350"
      
    wsfc_s2d:
      description: "Windows Server Failover Clustering with Storage Spaces Direct"
      variable_groups:
        - clusters
        - cluster_nodes
        - network_devices
      conflicts_with:
        - azure_local
        - wsfc_san
      estimated_variables: "250-350"
      
    wsfc_san:
      description: "Windows Server Failover Clustering with SAN storage"
      variable_groups:
        - clusters
        - cluster_nodes
        - network_devices
      conflicts_with:
        - azure_local
        - wsfc_s2d
      estimated_variables: "200-300"
      
    avd_azure:
      description: "Azure Virtual Desktop in Azure cloud"
      variable_groups:
        - avd
      conflicts_with: []
      requires: []
      estimated_variables: "50-100"
      
    avd_azure_local:
      description: "Azure Virtual Desktop on Azure Local"
      variable_groups:
        - avd
      conflicts_with: []
      requires:
        - azure_local
      estimated_variables: "50-100"
      
    scvmm:
      description: "System Center Virtual Machine Manager integration"
      variable_groups:
        - scvmm
        - arc_resource_bridge
      conflicts_with: []
      requires: []
      estimated_variables: "30-50"
      
    arc_vms:
      description: "Arc-enabled VMs (hybrid VM management)"
      variable_groups:
        - arc_hybrid_vms
      conflicts_with: []
      requires: []
      estimated_variables: "20-40"
      
    hyperv_host:
      description: "Standalone Hyper-V host (no cluster)"
      variable_groups: []
      conflicts_with:
        - azure_local
        - wsfc_s2d
        - wsfc_san
      estimated_variables: "150-250"
      note: "Only shared variable groups included"
      
    arc_scvmm:
      description: "Arc Resource Bridge for SCVMM"
      variable_groups:
        - arc_resource_bridge
        - scvmm
      conflicts_with: []
      estimated_variables: "100-150"
      
    arc_hybrid_vms:
      description: "Arc-enabled hybrid VMs (standalone Hyper-V, VMware, physical)"
      variable_groups:
        - arc_hybrid_vms
      conflicts_with: []
      estimated_variables: "100-150"
      note: "NOT for Azure Local cluster VMs - use azure_local flag for those"
      
    azure_only:
      description: "Azure cloud infrastructure only (no on-premises clusters)"
      variable_groups: []
      conflicts_with:
        - azure_local
        - wsfc_s2d
        - wsfc_san
      estimated_variables: "150-250"
      note: "Only shared variable groups included"

