# =============================================================================
# SCVMM INTEGRATION
# =============================================================================

scvmm:
  infrastructure_type: ["arc_scvmm"]
  scvmm_server_name:
    type: string
    description: "SCVMM server name"
    required: false
    example: "scvmm01.azlocal.mgmt"

  scvmm_cloud_name:
    type: string
    description: "SCVMM cloud name"
    required: false
    example: "AzureLocalCloud"

  scvmm_arc_enabled:
    type: boolean
    description: "SCVMM Arc integration enabled"
    required: false
    default: false

  scvmm_port:
    type: integer
    description: "SCVMM server port"
    required: false
    minimum: 1
    maximum: 65535
    default: 8100

  scvmm_library_share_path:
    type: string
    description: "UNC path to SCVMM library share for VM templates, ISOs, VHDs"
    required: false
    pattern: "^\\\\\\\\[a-zA-Z0-9.-]+\\\\[a-zA-Z0-9_$-]+$"
    example: "\\\\scvmm-server\\Library"
    note: "Library share stores VM templates, ISOs, VHDs"

  scvmm_run_as_account:
    type: string
    description: "SCVMM Run As account for automation (service account with SCVMM Administrator role)"
    required: false
    example: "domain\\scvmm-svc"

  scvmm_use_ssl:
    type: boolean
    description: "Use SSL for SCVMM server connection (recommended for secure communication)"
    required: false
    default: true

# =============================================================================
# AZURE ARC RESOURCE BRIDGE
# =============================================================================
# Arc Resource Bridge for SCVMM integration only (per user scope)
# Reference: https://learn.microsoft.com/azure/azure-arc/system-center-virtual-machine-manager/overview
# Supports VMM 2019/2022/2025 with up to 15,000 VMs
# =============================================================================

arc_resource_bridge:
  infrastructure_type: ["arc_scvmm"]
  arb_scvmm_enabled:
    type: boolean
    description: "Deploy Arc Resource Bridge for SCVMM integration (required for Azure Arc-enabled SCVMM)"
    required: false
    default: false
    note: "Supports VMM 2019/2022/2025, up to 15,000 VMs. Kubernetes-based virtual appliance."
    reference: "https://learn.microsoft.com/azure/azure-arc/system-center-virtual-machine-manager/overview"

  arb_scvmm_name:
    type: string
    description: "Name of Arc Resource Bridge appliance VM"
    required: false
    pattern: "^[a-z0-9-]{3,24}$"
    default: "arc-resource-bridge"
    example: "arb-scvmm-prod-01"

  arb_scvmm_resource_group:
    type: string
    description: "Azure resource group for Arc Resource Bridge resources"
    required: false
    default: "rg-arc-resource-bridge"
    example: "rg-azlc-iic-eus-arc-scvmm"

  arb_scvmm_location:
    type: string
    description: "Azure region for Arc Resource Bridge metadata (20+ regions supported)"
    required: false
    allowedValues:
    - East US
    - East US 2
    - West US 2
    - West US 3
    - Central US
    - North Europe
    - West Europe
    - UK South
    - Southeast Asia
    - Australia East
    default: "East US"

  arb_scvmm_custom_location_name:
    type: string
    description: "Custom location name mapping to SCVMM cloud (represents connection to specific SCVMM cloud)"
    required: false
    default: "scvmm-custom-location"
    example: "scvmm-production-cloud"

  # Service Principal Configuration
  arb_service_principal_app_id:
    category: "identity"
    subcategory: "arc-resource-bridge"
    type: string
    description: "Arc Resource Bridge service principal application ID"
    required: false
    format: uuid
    example: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
  
  arb_service_principal_object_id:
    category: "identity"
    subcategory: "arc-resource-bridge"
    type: string
    description: "Arc Resource Bridge service principal object ID"
    required: false
    format: uuid
    example: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
  
  hci_resource_provider_object_id:
    category: "identity"
    subcategory: "arc-resource-bridge"
    type: string
    description: "Azure Stack HCI resource provider object ID"
    required: false
    format: uuid
    example: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    note: "Required for RBAC assignments during cluster deployment"

# =============================================================================
# AZURE ARC HYBRID VM MANAGEMENT
# =============================================================================
# Arc-enabled servers for Hyper-V VMs, VMware VMs, and physical servers
# NOT for Azure Local cluster VMs (per user scope)
# Reference: https://learn.microsoft.com/azure/azure-arc/servers/overview
# =============================================================================

arc_hybrid_vms:
  infrastructure_type: ["arc_hybrid_vms"]
  # Arc Onboarding Configuration
  arc_onboard_hyperv_vms:
    type: boolean
    description: "Enable Arc onboarding for standalone Hyper-V VMs (NOT Azure Local cluster VMs)"
    required: false
    default: false
    note: "Installs Connected Machine agent for Hyper-V VMs not managed by Azure Local cluster"
    reference: "https://learn.microsoft.com/azure/azure-arc/servers/overview"

  arc_onboard_vmware_vms:
    type: boolean
    description: "Enable Arc onboarding for VMware vSphere VMs"
    required: false
    default: false
    note: "Requires Arc Resource Bridge for vSphere (separate from SCVMM). Supports vSphere 7.0/8.0, up to 9,500 VMs."
    reference: "https://learn.microsoft.com/azure/azure-arc/vmware-vsphere/overview"

  arc_onboard_physical_servers:
    type: boolean
    description: "Enable Arc onboarding for physical servers (bare-metal Windows Server or Linux)"
    required: false
    default: false

  # Arc VM Extensions
  arc_vm_extensions:
    type: array
    description: "VM extensions to deploy on Arc-enabled machines"
    required: false
    default: []
    allowedValues:
    - MicrosoftMonitoringAgent
    - AzureMonitorAgent
    - DependencyAgent
    - AzurePolicyforWindows
    - AzurePolicyforLinux
    - CustomScriptExtension
    - DSC
    example:
    - AzureMonitorAgent
    - DependencyAgent
    - AzurePolicyforWindows

  # Arc Management Services
  arc_update_management_enabled:
    type: boolean
    description: "Enable Azure Update Manager for Arc-enabled machines (manage OS updates for Windows and Linux servers)"
    required: false
    default: true

  arc_defender_enabled:
    type: boolean
    description: "Enable Microsoft Defender for Cloud integration (threat detection and vulnerability management)"
    required: false
    default: true

  arc_vm_insights_enabled:
    type: boolean
    description: "Enable VM Insights for performance monitoring (collects performance data and application dependencies)"
    required: false
    default: false

  arc_guest_configuration_enabled:
    type: boolean
    description: "Enable Azure Machine Configuration for guest configuration policies (audit settings inside Arc-enabled machines)"
    required: false
    default: false

# =============================================================================
# AZURE VIRTUAL DESKTOP
# =============================================================================
# AVD configuration for Azure-hosted and Azure Local session hosts
# Reference: https://learn.microsoft.com/azure/virtual-desktop/
# =============================================================================

avd:
  azure:
    infrastructure_type: ["avd_azure"]
    # Host Pool Configuration
    avd_host_pool_name:
      type: string
      description: "Name of AVD host pool"
      required: false
      pattern: "^[a-zA-Z0-9-_]{1,64}$"
      example: "hp-avd-prod-pooled-eus"

    avd_host_pool_type:
      type: string
      description: "Host pool type (Pooled = multi-user shared, Personal = dedicated single-user)"
      required: false
      allowedValues:
      - Pooled
      - Personal
      default: "Pooled"
      reference: "https://learn.microsoft.com/azure/virtual-desktop/terminology"

    avd_host_pool_load_balancer:
      type: string
      description: "Load balancing algorithm for pooled host pools (BreadthFirst = distribute evenly, DepthFirst = fill one host before moving to next)"
      required: false
      allowedValues:
      - BreadthFirst
      - DepthFirst
      default: "BreadthFirst"
      applies_to: "Pooled host pools only"

    avd_max_session_limit:
      type: integer
      description: "Maximum concurrent sessions per session host (balance cost vs performance)"
      required: false
      minimum: 1
      maximum: 50
      default: 16
      applies_to: "Pooled host pools only"

    # Session Host Configuration
    avd_session_host_count:
      type: integer
      description: "Number of session hosts to deploy"
      required: false
      minimum: 1
      maximum: 1000
      default: 2

    avd_session_host_size:
      type: string
      description: "Azure VM SKU for session hosts"
      required: false
      default: "Standard_D4s_v5"
      example: "Standard_D4s_v5"
      note: "Common SKUs: D4s_v5 (4vCPU, 16GB), D8s_v5 (8vCPU, 32GB), D16s_v5 (16vCPU, 64GB)"

    avd_session_host_os:
      type: string
      description: "Operating system for session hosts (multi-session exclusive to AVD, reduces VM count)"
      required: false
      allowedValues:
      - Windows-11-Enterprise-Multi-Session
      - Windows-11-Enterprise
      - Windows-10-Enterprise-Multi-Session
      - Windows-10-Enterprise
      - Windows-Server-2025
      - Windows-Server-2022
      - Windows-Server-2019
      default: "Windows-11-Enterprise-Multi-Session"
      note: "Only 64-bit versions supported. Ultra disks NOT supported for OS disk."
      reference: "https://learn.microsoft.com/azure/virtual-desktop/prerequisites"

    avd_session_host_disk_type:
      type: string
      description: "OS disk type for session hosts (Premium_LRS recommended for production)"
      required: false
      allowedValues:
      - Standard_LRS
      - StandardSSD_LRS
      - Premium_LRS
      default: "Premium_LRS"

    # FSLogix Profile Configuration
    avd_fslogix_enabled:
      type: boolean
      description: "Enable FSLogix profile containers (required for pooled environments to persist user profiles)"
      required: false
      default: true
      applies_to: "Pooled host pools only"

    avd_fslogix_storage_type:
      type: string
      description: "Storage backend for FSLogix profiles"
      required: false
      allowedValues:
      - AzureFiles
      - AzureNetAppFiles
      default: "AzureFiles"
      note: "Azure Files = SMB shares with AD DS or Entra ID auth, NetApp Files = high-performance NFS"

    avd_fslogix_storage_account:
      type: string
      description: "Azure Storage account name for FSLogix profiles"
      required: false
      pattern: "^[a-z0-9]{3,24}$"
      example: "stavdprofileseus001"

    avd_fslogix_share_name:
      type: string
      description: "File share name for FSLogix profiles"
      required: false
      default: "profiles"
      example: "avd-profiles"

    # Application Group & Workspace
    avd_app_group_type:
      type: string
      description: "Application group type (Desktop = full desktop, RemoteApp = individual apps)"
      required: false
      allowedValues:
      - Desktop
      - RemoteApp
      default: "Desktop"
      note: "Multiple RemoteApp groups allowed per host pool"
      reference: "https://learn.microsoft.com/azure/virtual-desktop/terminology#application-groups"

    avd_workspace_name:
      type: string
      description: "AVD workspace name (logical grouping of application groups)"
      required: false
      example: "ws-avd-prod-eus"

    # RDP Shortpath
    avd_rdp_shortpath_enabled:
      type: boolean
      description: "Enable RDP Shortpath for direct UDP transport (provides lower latency, requires UDP port open)"
      required: false
      default: false

  azure_local:
    infrastructure_type: ["avd_azure_local"]
    # Prerequisites & Enablement
    avd_azl_enabled:
      type: boolean
      description: "Enable Azure Virtual Desktop on Azure Local (requires 23H2+, cluster registered with Azure, AD DS domain)"
      required: false
      default: false
      prerequisites:
      - Azure Local version 23H2 or later
      - Cluster registered with Azure
      - Active Directory Domain Services (AD DS) domain
      note: "Generally available (GA) feature. Requires Azure Local service fee + per-vCPU AVD fee."
      reference: "https://learn.microsoft.com/azure/virtual-desktop/azure-stack-hci-overview"

    # Host Pool Configuration
    avd_azl_host_pool_name:
      type: string
      description: "AVD host pool name for Azure Local session hosts"
      required: false
      example: "hp-avd-azl-prod-pooled"
      critical_limitation: "Host pools CANNOT mix Azure and Azure Local session hosts. Must be 100% Azure or 100% Azure Local."

    avd_azl_session_host_count:
      type: integer
      description: "Number of AVD session hosts on Azure Local"
      required: false
      minimum: 1
      maximum: 100
      default: 2

    avd_azl_session_host_os:
      type: string
      description: "Operating system for Azure Local session hosts (only 64-bit versions supported)"
      required: false
      allowedValues:
      - Windows-11-Enterprise-Multi-Session
      - Windows-11-Enterprise
      - Windows-10-Enterprise-Multi-Session
      - Windows-10-Enterprise
      - Windows-Server-2025
      - Windows-Server-2022
      - Windows-Server-2019
      default: "Windows-11-Enterprise-Multi-Session"

    # Azure Connected Machine Agent (REQUIRED)
    avd_azl_connected_machine_agent_required:
      type: boolean
      description: "Azure Connected Machine agent required for IMDS (auto-installed via Azure portal, enables Arc VM extensions)"
      required: false
      default: true
      immutable: true

    # Storage Configuration
    avd_azl_storage_path:
      type: string
      description: "CSV path for AVD session host VHDXs"
      required: false
      pattern: "^C:\\\\ClusterStorage\\\\Volume\\d+\\\\.+$"
      example: "C:\\ClusterStorage\\Volume01\\AVD"

    avd_azl_profile_storage_type:
      type: string
      description: "FSLogix profile storage type for Azure Local"
      required: false
      allowedValues:
      - StorageSpacesDirect
      - LocalSMB
      - AzureFiles
      default: "StorageSpacesDirect"
      note: "Microsoft recommends Storage Spaces Direct VM-based file share cluster for optimal performance"
      reference: "https://learn.microsoft.com/azure/virtual-desktop/azure-stack-hci-overview#fslogix-profile-storage"

    # Licensing & Activation
    avd_azl_licensing_method:
      type: string
      description: "OS licensing/activation method for Azure Local VMs"
      required: false
      allowedValues:
      - AzureVerification
      - TraditionalActivation
      default: "AzureVerification"
      note: "AzureVerification = Windows 11/10 multi-session, Server 2022 Datacenter: Azure Edition. TraditionalActivation = other OS images."
      reference: "https://learn.microsoft.com/azure-stack/hci/deploy/azure-verification"

# =============================================================================
# KEY VAULT
# =============================================================================

keyvault:
  # =============================================================================
  # CMP PLATFORM KEY VAULT (Management Tenant - Cross-Tenant Secrets)
  # =============================================================================
  
  cmp_platform:
    kv_cmp_platform_name:
      category: "security"
      subcategory: "keyvault"
      type: string
      description: "CMP platform Key Vault name (management tenant - cross-tenant secrets)"
      required: true
      minLength: 3
      maxLength: 24
      pattern: "^[a-z][a-z0-9]+(-[a-z0-9]+)*$"
      note: "No consecutive hyphens allowed"
      example: "kv-azlc-mgmt"

    kv_cmp_platform_resource_group:
      category: "security"
      subcategory: "keyvault"
      type: string
      description: "CMP platform Key Vault resource group (function-based naming)"
      required: true
      pattern: "^rg-[a-z0-9]+-(iic|demo|poc|lab)-[a-z0-9]+-(identity|management)-[a-z0-9]+$"
      example: "rg-azlc-iic-eus-identity-mgmt"

    kv_cmp_platform_location:
      category: "security"
      subcategory: "keyvault"
      type: string
      description: "CMP platform Key Vault Azure region"
      required: true
      allowedValues:
        - eastus
        - eastus2
        - westus
        - westus2
        - centralus
      example: "eastus"

    kv_cmp_platform_subscription_id:
      type: string
      description: "Management tenant subscription ID for CMP platform Key Vault"
      required: true
      format: uuid
      example: "00000000-1111-2222-3333-444444444444"

    kv_cmp_platform_tenant_id:
      type: string
      description: "Management tenant ID (azurelocalcloud)"
      required: true
      format: uuid
      example: "00000000-aaaa-bbbb-cccc-111111111111"

    kv_cmp_platform_sku:
      type: string
      description: "CMP platform Key Vault SKU"
      required: false
      allowedValues:
        - standard
        - premium
      default: "standard"

    kv_cmp_platform_enable_rbac:
      type: boolean
      description: "Enable RBAC authorization"
      required: false
      default: true

    kv_cmp_platform_enable_soft_delete:
      type: boolean
      description: "Enable soft delete"
      required: false
      default: true

    kv_cmp_platform_soft_delete_retention_days:
      type: integer
      description: "Soft delete retention days"
      required: false
      minimum: 7
      maximum: 90
