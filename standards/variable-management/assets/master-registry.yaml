  arm_storage_account_type:
    type: string
    description: "Type of Azure Storage Account for diagnostics"
    required: false
    allowedValues:
      - Standard_LRS
      - Standard_GRS
      - Standard_RAGRS
    default: "Standard_LRS"
  default: "Standard_LRS"

  arm_diagnostic_storage_account_name:
    type: string
    description: "Name of Azure Storage Account for Key Vault audit logs"
    required: false
    minLength: 3
    maxLength: 24
    pattern: "^[a-z0-9]+$"
    example: "stazlciiceus001"

  arm_soft_delete_retention_days:
    type: integer
    description: "Key Vault soft delete retention days (7-90)"
    required: false
    minimum: 7
    maximum: 90
    default: 90


# =============================================================================
# NETWORK INTENTS
# =============================================================================
# Network intents define which physical network adapters are used for different traffic types.
# This section supports 1-16 intents for maximum flexibility:
# - 1 intent: Fully converged (all traffic on same adapters)
# - 2 intents: Management+Compute / Storage (most common)
# - 3+ intents: Fully disaggregated or custom configurations
#
# RELATED SECTIONS:
#   - logical_networks: (line 5658+) - VM networking layer built on top of intents
#   - cluster_nodes: (line 4732+) - Physical adapters referenced by intents
#   - vlans: (line 3264+) - VLAN IDs used by logical networks
#
# Each intent is self-contained with all its properties in one place.
# All parameters are validated against Microsoft ARM template requirements.

network_intents:
  infrastructure_type: ["azure_local"]
  type: array
  description: "Network intent configurations (1-16 intents supported). Each intent defines traffic types, adapters, and network settings."
  required: true
  minItems: 1
  maxItems: 16
  items:
    type: object
    required:
      - name
      - traffic_types
      - adapter_names
    properties:
      # Intent Identification
      name:
        type: string
        description: "Intent name (e.g., 'MgmtCompute', 'Storage', 'Converged')"
        required: true
        example: "MgmtCompute"
      
      # Traffic Types (Microsoft ARM parameter: intentList[].trafficType)
      traffic_types:
        type: array
        description: "Traffic types for this intent (ARM parameter: trafficType)"
        required: true
        items:
          type: string
        enum: ["Management", "Compute", "Storage"]
        minItems: 1
        maxItems: 3
        example: ["Management", "Compute"]
      
      # Physical Adapters (Microsoft ARM parameter: intentList[].adapter)
      adapter_names:
        type: array
        description: "Physical network adapter names (minimum 2 for HA, ARM parameter: adapter)"
        required: true
        items:
          type: string
        minItems: 2
        example: ["Slot 2 Port 1", "Slot 2 Port 2"]
      
      # Management/Compute Network Settings
      subnet:
        type: string
        description: "Network subnet (CIDR) for management/compute traffic"
        required: false
        format: cidr
        example: "192.168.211.0/24"
      
      gateway:
        type: string
        description: "Network gateway for management/compute traffic"
        required: false
        format: ipv4
        example: "192.168.211.1"
      
      vlan_id:
        type: integer
        description: "VLAN ID for management/compute traffic"
        required: false
        minimum: 0
        maximum: 4094
        example: 211
      
      dns_servers:
        type: array
        description: "DNS servers for management traffic"
        required: false
        items:
          type: string
          format: ipv4
        example:
          - "192.168.211.10"
          - "192.168.211.11"
      
      # Storage Network Settings (Microsoft ARM parameter: storageNetworkList)
      storage_networks:
        type: array
        description: "Storage network configurations (ARM parameter: storageNetworkList)"
        required: false
        items:
          type: object
          properties:
            subnet:
              type: string
              description: "Storage network subnet (CIDR)"
              format: cidr
              example: "10.71.212.0/24"
            vlan_id:
              type: integer
              description: "Storage VLAN ID"
              minimum: 1
              maximum: 4094
              example: 712
        minItems: 1
        maxItems: 4
        example:
          - subnet: "10.71.212.0/24"
            vlan_id: 712
          - subnet: "10.71.213.0/24"
            vlan_id: 713
      
      # Storage Configuration (Microsoft ARM parameters)
      enable_storage_auto_ip:
        type: boolean
        description: "Enable automatic IP assignment for storage (ARM parameter: enableStorageAutoIp). Must be FALSE for switchless storage."
        required: false
        default: true
      
      storage_connectivity_switchless:
        type: boolean
        description: "Use switchless storage topology (ARM parameter: storageConnectivitySwitchless). Max 4 nodes, requires manual IPs."
        required: false
        default: false
      
      # Storage Adapter IPs (for switchless or manual IP assignment)
      storage_adapter_ips:
        type: array
        description: "Manual IP assignment for storage adapters (ARM parameter: storageAdapterIPInfo). Required when enable_storage_auto_ip is false."
        required: false
        items:
          type: object
          properties:
            node_name:
              type: string
              description: "Cluster node name"
              example: "azlc-node01"
            adapter_name:
              type: string
              description: "Physical adapter name"
              example: "Slot 6 Port 1"
            ipv4_address:
              type: string
              description: "IPv4 address for this adapter"
              format: ipv4
              example: "10.71.212.1"
            subnet_mask:
              type: string
              description: "Subnet mask"
              format: ipv4
              example: "255.255.255.0"
        example:
          - node_name: "azlc-node01"
            adapter_name: "Slot 6 Port 1"
            ipv4_address: "10.71.212.1"
            subnet_mask: "255.255.255.0"
      
      # Adapter Property Overrides (Microsoft ARM parameter: adapterPropertyOverrides)
      jumbo_packet_size:
        type: integer
        description: "Jumbo packet (MTU) size (ARM parameter: adapterPropertyOverrides.jumboPacket)"
        required: false
        minimum: 1500
        maximum: 9014
        default: 9014
        example: 9014
      
      network_direct_enabled:
        type: boolean
        description: "Enable RDMA/NetworkDirect (ARM parameter: adapterPropertyOverrides.networkDirect)"
        required: false
        default: true
      
      network_direct_technology:
        type: string
        description: "RDMA technology (ARM parameter: adapterPropertyOverrides.networkDirectTechnology)"
        required: false
        allowedValues:
          - iWARP
          - RoCEv2
        default: "RoCEv2"
        example: "RoCEv2"
  
  # Example configurations (for reference - not part of the schema)
  # Three complexity levels: minimal, standard, complete
  examples:
    minimal:
      # Simplest valid configuration - single converged intent
      # Use case: Testing, POC, or simple lab environments
      - name: "Converged"
        traffic_types: ["Management", "Compute", "Storage"]
        adapter_names: ["Slot 2 Port 1", "Slot 2 Port 2"]
        subnet: "192.168.211.0/24"
        gateway: "192.168.211.1"
        vlan_id: 211
        dns_servers: ["192.168.211.10"]
        storage_networks:
          - subnet: "10.71.212.0/24"
            vlan_id: 712
        enable_storage_auto_ip: true
    
    standard:
      # Production-ready 2-intent deployment (most common)
      # Use case: Standard production deployments with separated storage
      - name: "MgmtCompute"
        traffic_types: ["Management", "Compute"]
        adapter_names: ["Slot 2 Port 1", "Slot 2 Port 2"]
        subnet: "192.168.211.0/24"
        gateway: "192.168.211.1"
        vlan_id: 211
        dns_servers: ["192.168.211.10", "192.168.211.11"]
      
      - name: "Storage"
        traffic_types: ["Storage"]
        adapter_names: ["Slot 6 Port 1", "Slot 6 Port 2"]
        storage_networks:
          - subnet: "10.71.212.0/24"
            vlan_id: 712
          - subnet: "10.71.213.0/24"
            vlan_id: 713
        enable_storage_auto_ip: true
        jumbo_packet_size: 9014
        network_direct_enabled: true
        network_direct_technology: "RoCEv2"
    
    complete:
      # Advanced configuration with all options (switchless storage)
      # Use case: High-performance clusters with manual IP control (1-4 nodes max)
      - name: "MgmtCompute"
        traffic_types: ["Management", "Compute"]
        adapter_names: ["Slot 2 Port 1", "Slot 2 Port 2"]
        subnet: "192.168.211.0/24"
        gateway: "192.168.211.1"
        vlan_id: 211
        dns_servers: ["192.168.211.10", "192.168.211.11"]
        jumbo_packet_size: 9014
      
      - name: "Storage"
        traffic_types: ["Storage"]
        adapter_names: ["Slot 6 Port 1", "Slot 6 Port 2", "Slot 6 Port 3", "Slot 6 Port 4"]
        storage_networks:
          - subnet: "10.71.212.0/24"
            vlan_id: 712
          - subnet: "10.71.213.0/24"
            vlan_id: 713
        enable_storage_auto_ip: false  # Required for switchless
        storage_connectivity_switchless: true
        jumbo_packet_size: 9014
        network_direct_enabled: true
        network_direct_technology: "RoCEv2"
        storage_adapter_ips:
          - node_name: "azlc-node01"
            adapter_name: "Slot 6 Port 1"
            ipv4_address: "10.71.212.1"
            subnet_mask: "255.255.255.0"
          - node_name: "azlc-node01"
            adapter_name: "Slot 6 Port 2"
            ipv4_address: "10.71.212.2"
            subnet_mask: "255.255.255.0"
          - node_name: "azlc-node02"
            adapter_name: "Slot 6 Port 1"
            ipv4_address: "10.71.212.3"
            subnet_mask: "255.255.255.0"
          - node_name: "azlc-node02"
            adapter_name: "Slot 6 Port 2"
            ipv4_address: "10.71.212.4"
            subnet_mask: "255.255.255.0"

# =============================================================================
# LOGICAL NETWORKS
# =============================================================================
# Logical network configurations for VM networking layer (1-16 networks supported)
# Management-Compute network is primary and required (VLAN 211)
# Additional workload networks are optional and scalable
#
# RELATED SECTIONS:
#   - network_intents: (line 5391+) - Physical adapter layer (intents must exist first)
#   - vlans: (line 3264+) - VLAN definitions and IP addressing
#   - dhcp: (line 3675+) - DHCP scope configuration for each network
#
# ARM TEMPLATE MAPPING:
#   logicalNetworks: [
#     {
#       name: string
#       addressPrefix: string (CIDR)
#       defaultGateway: string (IPv4)
#       vlan: integer (0-4094)
#       dnsServers: array
#       ipAllocationMethod: "Static" | "Dynamic"
#       ipPools: [ { name, start, end, type } ]
#       dhcpOptions: { dnsServers, domainName, ntpServers }
#       routes: [ { name, addressPrefix, nextHop } ]
#     }
#   ]
#
# EXAMPLES:
#   1. Management-Compute network (PRIMARY - always required):
#      - name: "ln-management-compute"
#        address_prefix: "192.168.211.0/24"
#        vlan_id: 211
#        ip_pools: [{ start: "192.168.211.100", end: "192.168.211.200" }]
#
#   2. Multiple networks (management + workloads):
#      - name: "ln-management-compute"
#        vlan_id: 211
#      - name: "ln-workload-web"
#        vlan_id: 501
#      - name: "ln-workload-app"
#        vlan_id: 502
#
#   3. Advanced with DHCP options and routes:
#      - name: "ln-management-compute"
#        dhcp_options:
#          dns_servers: ["192.168.211.10"]
#          domain_name: "azlocal.cloud"
#        routes:
#          - name: "default-route"
#            address_prefix: "0.0.0.0/0"
#            next_hop: "192.168.211.1"

logical_networks:
  infrastructure_type: ["azure_local"]
  type: array
  description: "Logical network configurations (VM networking layer). Management-Compute network is primary and required."
  required: true
  minItems: 1
  maxItems: 16
  items:
    type: object
    required:
      - name
      - address_prefix
      - default_gateway
      - vlan_id
    properties:
      # Network Identification
      name:
        type: string
        description: "Logical network name (ARM parameter: name)"
        required: true
        example: "ln-management-compute"

      display_name:
        type: string
        description: "Display name for Azure portal"
        required: false
        example: "Management-Compute Network"

      # Network Configuration (ARM parameters)
      address_prefix:
        type: string
        description: "Network address prefix in CIDR notation (ARM parameter: addressPrefix)"
        required: true
        format: cidr
        example: "192.168.211.0/24"

      default_gateway:
        type: string
        description: "Default gateway for the network (ARM parameter: defaultGateway)"
        required: true
        format: ipv4
        example: "192.168.211.1"

      vlan_id:
        type: integer
        description: "VLAN ID for network isolation (ARM parameter: vlan)"
        required: true
        minimum: 0
        maximum: 4094
        example: 211

      dns_servers:
        type: array
        description: "DNS servers for the network (ARM parameter: dnsServers)"
        required: false
        items:
          type: string
          format: ipv4
        example:
          - "192.168.211.10"
          - "192.168.211.11"

      # IP Allocation (ARM parameter: ipAllocationMethod and ipPools)
      ip_allocation_method:
        type: string
        description: "IP allocation method (ARM parameter: ipAllocationMethod)"
        required: false
        allowedValues:
          - Static
          - Dynamic
        default: "Static"
        example: "Static"

      ip_pools:
        type: array
        description: "IP address pools for VM allocation (ARM parameter: ipPools). Supports multiple pools per network."
        required: false
        items:
          type: object
          required:
            - start
            - end
          properties:
            name:
              type: string
              description: "IP pool name"
              required: false
              example: "default-pool"
            start:
              type: string
              description: "Starting IP address"
              required: true
              format: ipv4
              example: "192.168.211.100"
            end:
              type: string
              description: "Ending IP address"
              required: true
              format: ipv4
              example: "192.168.211.200"
            type:
              type: string
              description: "Pool type (vm, k8s, etc.)"
              required: false
              default: "vm"
              example: "vm"
        minItems: 1
        example:
        - name: "vm-pool"
          start: "192.168.211.100"
          end: "192.168.211.200"
          type: "vm"

      # DHCP Options (ARM parameter: dhcpOptions)
      dhcp_options:
        type: object
        description: "DHCP configuration options (ARM parameter: dhcpOptions)"
        required: false
        properties:
          dns_servers:
            type: array
            description: "DHCP DNS servers"
            required: false
            items:
              type: string
              format: ipv4
            example:
              - "192.168.211.10"
          domain_name:
            type: string
            description: "DHCP domain name"
            required: false
            example: "azlocal.cloud"
          ntp_servers:
            type: array
            description: "NTP servers for time sync"
            required: false
            items:
              type: string
            example:
              - "192.168.211.1"
        example:
          dns_servers: ["192.168.211.10"]
          domain_name: "azlocal.cloud"

      # Routes (ARM parameter: routes)
      routes:
        type: array
        description: "Static routes for the network (ARM parameter: routes)"
        required: false
        items:
          type: object
          required:
            - address_prefix
            - next_hop
          properties:
            name:
              type: string
              description: "Route name"
              required: false
              example: "default-route"
            address_prefix:
              type: string
              description: "Destination address prefix"
              required: true
              format: cidr
              example: "0.0.0.0/0"
            next_hop:
              type: string
              description: "Next hop IP address"
              required: true
              format: ipv4
              example: "192.168.211.1"
        example:
        - name: "default-route"
          address_prefix: "0.0.0.0/0"
          next_hop: "192.168.211.1"

      # Additional Settings
      immutable:
        type: boolean
        description: "Network configuration is immutable after creation"
        required: false
        default: false

      network_intent_binding:
        type: string
        description: "Bind to specific network intent (optional)"
        required: false
        example: "MgmtCompute"

  # Example configurations (for reference - not part of the schema)
  # Three complexity levels: minimal, standard, complete
  examples:
    minimal:
      # Simplest valid configuration - single management-compute network
      # Use case: Testing, POC, or simple lab environments
      - name: "ln-management-compute"
        address_prefix: "192.168.211.0/24"
        default_gateway: "192.168.211.1"
        vlan_id: 211
        dns_servers: ["192.168.211.10"]
        ip_allocation_method: "Static"
        ip_pools:
          - start: "192.168.211.100"
            end: "192.168.211.200"
    
    standard:
      # Production multi-network deployment (management + workloads)
      # Use case: Standard production with separated workload networks
      
      # Network 1: Management-Compute (PRIMARY - always required)
      - name: "ln-management-compute"
        display_name: "Management-Compute Network"
        address_prefix: "192.168.211.0/24"
        default_gateway: "192.168.211.1"
        vlan_id: 211
        dns_servers: ["192.168.211.10", "192.168.211.11"]
        ip_allocation_method: "Static"
        ip_pools:
          - name: "management-vm-pool"
            start: "192.168.211.100"
            end: "192.168.211.150"
            type: "vm"
          - name: "arc-vm-pool"
            start: "192.168.211.151"
            end: "192.168.211.200"
            type: "vm"
        dhcp_options:
          dns_servers: ["192.168.211.10", "192.168.211.11"]
          domain_name: "azlocal.cloud"
        network_intent_binding: "MgmtCompute"
      
      # Network 2: Workload-Web
      - name: "ln-workload-web"
        display_name: "Web Tier Network"
        address_prefix: "192.168.100.0/24"
        default_gateway: "192.168.100.1"
        vlan_id: 501
        dns_servers: ["192.168.211.10"]
        ip_allocation_method: "Static"
        ip_pools:
          - name: "web-vm-pool"
            start: "192.168.100.100"
            end: "192.168.100.200"
            type: "vm"
        network_intent_binding: "MgmtCompute"
      
      # Network 3: Workload-App
      - name: "ln-workload-app"
        display_name: "Application Tier Network"
        address_prefix: "192.168.51.0/24"
        default_gateway: "192.168.51.1"
        vlan_id: 502
        dns_servers: ["192.168.211.10"]
        ip_allocation_method: "Static"
        ip_pools:
          - name: "app-vm-pool"
            start: "192.168.51.100"
            end: "192.168.51.200"
            type: "vm"
        network_intent_binding: "MgmtCompute"
    
    complete:
      # Advanced configuration with all optional features
      # Use case: Enterprise production with routing, DHCP options, multiple IP pools
      - name: "ln-management-compute"
        display_name: "Management-Compute Network"
        address_prefix: "192.168.211.0/24"
        default_gateway: "192.168.211.1"
        vlan_id: 211
        dns_servers:
          - "192.168.211.10"
          - "192.168.211.11"
        ip_allocation_method: "Static"
        ip_pools:
          - name: "management-pool"
            start: "192.168.211.100"
            end: "192.168.211.130"
            type: "vm"
          - name: "arc-vm-pool"
            start: "192.168.211.131"
            end: "192.168.211.160"
            type: "vm"
          - name: "kubernetes-pool"
            start: "192.168.211.161"
            end: "192.168.211.200"
            type: "k8s"
        dhcp_options:
          dns_servers:
            - "192.168.211.10"
            - "192.168.211.11"
          domain_name: "azlocal.cloud"
          ntp_servers:
            - "192.168.211.1"
        routes:
          - name: "default-route"
            address_prefix: "0.0.0.0/0"
            next_hop: "192.168.211.1"
          - name: "azure-wire-server"
            address_prefix: "168.63.129.16/32"
            next_hop: "192.168.211.1"
          - name: "corp-network"
            address_prefix: "10.0.0.0/8"
            next_hop: "192.168.211.254"
        network_intent_binding: "MgmtCompute"
        immutable: false

# =============================================================================
# NETWORK DEVICES
# =============================================================================
# Network infrastructure device configurations - generic array structure supporting
# any combination of switches, firewalls, routers, console servers, etc.
# Fully optional and scalable (0-32+ devices per environment).

network_devices:
  infrastructure_type: ["wsfc_s2d", "wsfc_san"]
  type: array
  description: "Network infrastructure device configurations (switches, firewalls, routers, console servers). Optional and scalable."
  required: false
  minItems: 0
  maxItems: 32
  items:
    type: object
    required: [device_type, device_role, device_hostname, device_management_ip]
    properties:
    # -----------------------------------------------------------------------
    # DEVICE IDENTIFICATION
    # -----------------------------------------------------------------------
      device_type:
        type: string
        description: "Device type classification"
        required: true
        allowedValues:
          - switch
          - firewall
          - router
          - console_server
          - wireless_controller
          - load_balancer
        example: "switch"
      
      device_role:
        type: string
        description: "Device role in infrastructure"
        required: true
        allowedValues:
          - primary
          - secondary
          - standalone
        example: "primary"
      
      device_hostname:
        type: string
        description: "Device hostname"
        required: true
        maxLength: 15
        example: "switch01"
      
      device_management_ip:
        type: string
        description: "Device management IP address"
        format: ipv4
        required: true
        example: "192.168.211.10"
      
      device_management_vlan:
        type: integer
        description: "Device management VLAN ID"
        required: false
        minimum: 0
        maximum: 4094
        example: 211
      
    # -----------------------------------------------------------------------
    # HARDWARE DETAILS
    # -----------------------------------------------------------------------
      device_vendor:
        type: string
        description: "Device manufacturer/vendor"
        required: false
        allowedValues:
          - Dell
          - Fortinet
          - Cisco
          - Arista
          - Ubiquiti
          - OpenGear
          - HPE
          - Juniper
        example: "Dell"
      
      device_model:
        type: string
        description: "Device model number"
        required: false
        example: "S5248F-ON"
      
      device_serial_number:
        type: string
        description: "Device serial number"
        required: false
        example: "CN7942V1AB"
      
      device_firmware_version:
        type: string
        description: "Device firmware/OS version"
        required: false
        example: "10.5.5.5"
      
      device_mac_address:
        type: string
        description: "Device MAC address"
        format: mac
        required: false
        example: "AA:BB:CC:DD:EE:FF"
      
    # -----------------------------------------------------------------------
    # CREDENTIALS (Key Vault References)
    # -----------------------------------------------------------------------
      device_username_secret:
        type: string
        description: "Device username (Key Vault secret reference)"
        required: false
        sensitive: true
        pattern: "^keyvault://[a-z0-9-]+/.+$"
        example: "keyvault://kv-azlc-mgmt/switch-username"
      
      device_password_secret:
        type: string
        description: "Device password (Key Vault secret reference)"
        required: false
        sensitive: true
        pattern: "^keyvault://[a-z0-9-]+/.+$"
        example: "keyvault://kv-azlc-mgmt/switch-password"
      
      device_management_protocol:
        type: string
        description: "Device management protocol"
        required: false
        allowedValues:
          - SSH
          - HTTPS
          - Telnet
          - SNMP
        default: "SSH"
        example: "SSH"
      
    # -----------------------------------------------------------------------
    # HIGH AVAILABILITY CONFIGURATION
    # -----------------------------------------------------------------------
      device_ha_enabled:
        type: boolean
        description: "High availability enabled"
        required: false
        default: false
        example: true
      
      device_ha_mode:
        type: string
        description: "High availability mode"
        required: false
        allowedValues:
          - active-active
          - active-passive
          - stack
        example: "active-active"
      
      device_ha_priority:
        type: integer
        description: "HA priority (higher value = higher priority)"
        required: false
        minimum: 0
        maximum: 255
        example: 200
      
      device_ha_sync_interface:
        type: string
        description: "HA heartbeat/sync interface name"
        required: false
        example: "port5"
      
      device_ha_virtual_ip:
        type: string
        description: "HA virtual/cluster IP address"
        format: ipv4
        required: false
        example: "192.168.211.254"
      
    # -----------------------------------------------------------------------
    # CONSOLE SERVER SPECIFIC
    # -----------------------------------------------------------------------
      device_serial_ports:
        type: integer
        description: "Number of serial console ports"
        required: false
        minimum: 0
        maximum: 96
        example: 48
      
      device_network_ports:
        type: integer
        description: "Number of network switch ports"
        required: false
        minimum: 0
        maximum: 48
        example: 4
      
    # -----------------------------------------------------------------------
    # ROUTING & NETWORKING
    # -----------------------------------------------------------------------
      device_wan_ip:
        type: string
        description: "WAN/external IP address"
        format: ipv4
        required: false
        example: "203.0.113.1"
      
      device_gateway_ips:
        type: array
        description: "Gateway IP addresses managed by device"
        required: false
        items:
          type: string
          format: ipv4
        example:
          - "192.168.211.1"
      
      device_static_routes:
        type: array
        description: "Static routes configured on device"
        required: false
        items:
          type: object
          properties:
            destination:
              type: string
              description: "Destination network (CIDR)"
              example: "10.0.0.0/8"
            gateway:
              type: string
              description: "Next-hop gateway IP"
              format: ipv4
              example: "192.168.211.1"
      
    # -----------------------------------------------------------------------
    # SWITCH SPECIFIC
    # -----------------------------------------------------------------------
      device_port_config:
        type: array
        description: "Port configuration for switches"
        required: false
        items:
          type: object
          properties:
            port:
              type: string
              description: "Port identifier"
              example: "1/1"
            vlan:
              type: integer
              description: "VLAN ID"
              minimum: 0
              maximum: 4094
              example: 211
            mode:
              type: string
              description: "Port mode"
              allowedValues: [access, trunk]
              example: "access"
      
    # -----------------------------------------------------------------------
    # FIREWALL SPECIFIC
    # -----------------------------------------------------------------------
      device_policy_name:
        type: string
        description: "Firewall policy/ruleset name"
        required: false
        example: "fp-azlc-iic"
      
    # -----------------------------------------------------------------------
    # SUPPORT & DOCUMENTATION
    # -----------------------------------------------------------------------
      device_vendor_support:
        type: string
        description: "Vendor support contract information"
        required: false
        example: "Fortinet ProSupport - Contract #12345"
      
      device_rack_position:
        type: string
        description: "Physical rack location"
        required: false
        example: "RAL-Rack01-U1"
      
      device_notes:
        type: string
        description: "Additional device notes"
        required: false
        example: "Primary datacenter switch"

# =============================================================================
# ACCOUNTS
# =============================================================================

accounts:
  # Local Administrator Accounts
  account_local_admin_username:
    type: string
    description: "Local administrator username"
    required: true
    example: "osfadmin"

  account_local_admin_password:
    type: string
    description: "Local admin password (Key Vault reference)"
    required: true
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/local-admin-password"

  account_linux_admin_username:
    type: string
    description: "Linux local administrator username"
    required: false
    default: "linuxadmin"

  account_linux_admin_password:
    type: string
    description: "Linux administrator password (Key Vault reference)"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/linux-admin-password"

  account_linux_admin_ssh_public_key:
    type: string
    description: "Linux administrator SSH public key"
    required: false
    example: "ssh-rsa AAAAB3NzaC1yc2E..."

  linux_admin_ssh_private_key:
    type: string
    description: "Linux administrator SSH private key (Key Vault reference)"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/linux-admin-ssh-private-key"

  # Active Directory Service Accounts
  account_ad_domain_admin_username:
    type: string
    description: "Domain admin username"
    required: false
    example: "AZLOCAL\\Administrator"

  account_ad_domain_admin_password:
    type: string
    description: "Domain admin password (Key Vault reference)"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/domain-admin-password"

  account_lcm_username:
    type: string
    description: "Azure Local Lifecycle Manager (LCM) deployment account sAMAccountName — bare username only, do NOT include @domain (the domain is specified separately via domainFqdn)"
    required: false
    example: "svc-azlocal-lcm"

  account_lcm_password:
    type: string
    description: "Azure Local LCM deployment account password (Key Vault reference)"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/lcm-deployment-password"

  # Service Principals
  spn_automation_name:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "Automation service principal name"
    required: false
    example: "IIC-CMP-Automation-SPN"

  spn_automation_client_id:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "Automation SPN client ID"
    required: false
    format: uuid
    sensitive: true
    example: "00000000-aaaa-bbbb-cccc-333333333333"

  spn_automation_password:
    type: string
    description: "Automation SPN password (Key Vault reference)"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/automation-spn-secret"

  # Azure Local Deployment Service Principals
  spn_azl_deployment_name:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "Azure Local cluster deployment service principal name (used for ARM template deployments)"
    required: false
    example: "AzureLocal-Deployment-SPN"

  spn_azl_deployment_client_id:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "Azure Local deployment SPN client ID (app ID)"
    required: false
    format: uuid
    sensitive: true
    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

  spn_azl_deployment_object_id:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "Azure Local deployment SPN object ID (for RBAC assignments)"
    required: false
    format: uuid
    example: "12345678-abcd-ef12-3456-789012345678"

  spn_azl_deployment_secret:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "Azure Local deployment SPN secret (Key Vault reference)"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/azl-deployment-spn-secret"

  # Azure Local Onboarding Service Principals
  spn_azl_onboarding_name:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "Azure Local tenant onboarding service principal name (used for cross-tenant setup)"
    required: false
    example: "AzureLocal-Onboarding-SPN"

  spn_azl_onboarding_client_id:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "Azure Local onboarding SPN client ID (app ID)"
    required: false
    format: uuid
    sensitive: true
    example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"

  spn_azl_onboarding_object_id:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "Azure Local onboarding SPN object ID (for RBAC assignments)"
    required: false
    format: uuid
    example: "23456789-bcde-f123-4567-890123456789"

  spn_azl_onboarding_secret:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "Azure Local onboarding SPN secret (Key Vault reference)"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/azl-onboarding-spn-secret"

  # Entra ID Security Groups
  entraid_group_keyvault_admins:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for Key Vault administrators (object ID or display name)"
    required: false
    example: "azlc-key-vault-admins"
    note: "Group members have full access to Key Vault secrets, keys, and certificates"

  entraid_group_keyvault_readers:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for Key Vault readers (object ID or display name)"
    required: false
    example: "azlc-key-vault-readers"
    note: "Group members have read-only access to Key Vault secrets"

  entraid_group_subscription_owners:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for subscription owners (object ID or display name)"
    required: false
    example: "azlc-subscription-owners"
    note: "Group members have Owner role at subscription scope"

  entraid_group_subscription_contributors:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for subscription contributors (object ID or display name)"
    required: false
    example: "azlc-subscription-contributors"
    note: "Group members have Contributor role at subscription scope"

  entraid_group_subscription_readers:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for subscription readers (object ID or display name)"
    required: false
    example: "azlc-subscription-readers"
    note: "Group members have Reader role at subscription scope"

  entraid_group_pim_eligible_admins:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for PIM-eligible administrators (object ID or display name)"
    required: false
    example: "azlc-pim-eligible-admins"
    note: "Group members can activate privileged roles via PIM (just-in-time access)"

  entraid_group_pim_permanent_admins:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for PIM permanent administrators (object ID or display name)"
    required: false
    example: "azlc-pim-permanent-admins"
    note: "Group members have permanent privileged access (use sparingly)"

  entraid_group_azl_operators:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for Azure Local cluster operators (object ID or display name)"
    required: false
    example: "azlc-operators"
    note: "Group members can manage Azure Local clusters and perform day-to-day operations"

  entraid_group_azl_deployment_admins:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for Azure Local deployment administrators (object ID or display name)"
    required: false
    example: "azlc-deployment-admins"
    note: "Group members can deploy and configure Azure Local clusters"

  entraid_group_b2b_admins:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for B2B/cross-tenant administrators (object ID or display name)"
    required: false
    example: "azlc-b2b-env-admins"
    note: "Group members can manage B2B invitations and cross-tenant access policies"

  entraid_group_network_admins:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for network administrators (object ID or display name)"
    required: false
    example: "azlc-network-admins"
    note: "Group members can manage virtual networks, NSGs, and network resources"

  entraid_group_security_admins:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for security administrators (object ID or display name)"
    required: false
    example: "azlc-security-admins"
    note: "Group members can manage security policies, Azure Policy, and compliance"

  entraid_group_monitoring_readers:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for monitoring readers (object ID or display name)"
    required: false
    example: "azlc-monitoring-readers"
    note: "Group members can view monitoring data, logs, and alerts"

  entraid_group_automation_accounts:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for automation service accounts (object ID or display name)"
    required: false
    example: "azlc-automation-accounts"
    note: "Group for service principals and automation accounts with managed access"

  entraid_group_backup_operators:
    category: "identity"
    subcategory: "security-group"
    type: string
    description: "Entra ID security group for backup operators (object ID or display name)"
    required: false
    example: "azlc-backup-operators"
    note: "Group members can manage backup and recovery operations"

  # Azure Local Deployment RBAC Roles
  # Required roles for Azure Local (Azure Stack HCI) deployments via portal or ARM templates
  # Reference: https://learn.microsoft.com/azure-stack/hci/deploy/deployment-prerequisites
  
  azl_rbac_deployment_principals:
    category: "identity"
    subcategory: "rbac"
    type: array
    description: "Principals (users/groups/SPNs) requiring Azure Local deployment permissions"
    required: false
    items:
      type: object
      required:
        - principal_id
        - principal_type
      properties:
        principal_id:
          type: string
          description: "Object ID of user, group, or service principal"
          format: uuid
        principal_type:
          type: string
          description: "Type of principal"
          enum: ["User", "Group", "ServicePrincipal"]
        display_name:
          type: string
          description: "Display name for reference"
    example:
      - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
        principal_type: "ServicePrincipal"
        display_name: "AzureLocal-Deployment-SPN"
      - principal_id: "12345678-1234-1234-1234-123456789012"
        principal_type: "Group"
        display_name: "azlc-deployment-admins"

  azl_rbac_required_roles_subscription:
    category: "identity"
    subcategory: "rbac"
    type: array
    description: "Required RBAC roles at subscription scope for Azure Local deployment"
    required: true
    items:
      type: string
    default:
    - "Azure Stack HCI Administrator"
    - "Reader"
    - "Key Vault Secrets User"
    - "Key Vault Contributor"
    - "Storage Account Contributor"
    example:
    - "Azure Stack HCI Administrator"
    - "Reader"
    - "Key Vault Secrets User"
    - "Key Vault Contributor"
    - "Storage Account Contributor"
    note: "These roles must be assigned at subscription level for deployment user/SPN"

  azl_rbac_required_roles_resource_group:
    category: "identity"
    subcategory: "rbac"
    type: array
    description: "Required RBAC roles at resource group scope for Azure Local deployment"
    required: false
    items:
      type: string
    default:
    - "Contributor"
    - "Key Vault Secrets Officer"
    example:
    - "Contributor"
    - "Key Vault Secrets Officer"
    note: "These roles must be assigned at resource group level for deployment resources"

  azl_rbac_custom_role_arc_registration:
    category: "identity"
    subcategory: "rbac"
    type: object
    description: "Custom role definition for Azure Arc machine registration (required for cluster nodes)"
    required: false
    properties:
      name:
        type: string
        description: "Custom role name"
        example: "Azure Stack HCI registration role - custom"
      description:
        type: string
        description: "Role description"
      permissions:
        type: array
        description: "Required permissions for Arc registration"
        items:
          type: string
        default:
          - "Microsoft.HybridCompute/machines/read"
          - "Microsoft.HybridCompute/machines/write"
          - "Microsoft.HybridCompute/machines/delete"
          - "Microsoft.GuestConfiguration/guestConfigurationAssignments/read"
    example:
      name: "Azure Stack HCI registration role - custom"
      description: "Custom role for Arc-enabling cluster nodes"
      permissions:
        - "Microsoft.HybridCompute/machines/read"
        - "Microsoft.HybridCompute/machines/write"
        - "Microsoft.HybridCompute/machines/delete"
        - "Microsoft.GuestConfiguration/guestConfigurationAssignments/read"
      note: "Required for Arc-enabling cluster nodes during deployment"

  azl_rbac_role_assignments:
    category: "identity"
    subcategory: "rbac"
    type: array
    description: "Complete RBAC role assignments for Azure Local deployment (declarative model)"
    required: false
    items:
      type: object
      required:
        - principal_id
        - role_definition_name
        - scope
      properties:
        principal_id:
          type: string
          description: "Object ID of principal (user/group/SPN)"
          format: uuid
        principal_type:
          type: string
          description: "Principal type"
          enum: ["User", "Group", "ServicePrincipal"]
          default: "ServicePrincipal"
        role_definition_name:
          type: string
          description: "Built-in or custom role name"
          example: "Azure Stack HCI Administrator"
        role_definition_id:
          type: string
          description: "Role definition resource ID (optional, use name instead)"
          format: azure_resource_id
        scope:
          type: string
          description: "Assignment scope (subscription, resource group, or resource)"
          format: azure_resource_id
        description:
          type: string
          description: "Assignment description/justification"
        condition:
          type: string
          description: "Role assignment condition (ABAC)"
    examples:
      minimal:
        # Simplest - SPN with required roles at subscription
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Azure Stack HCI Administrator"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
          description: "Deployment SPN - HCI Administrator"
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Key Vault Secrets User"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
          description: "Deployment SPN - Key Vault access"
      
      standard:
        # Production - SPN and admin group with full permissions
        # Deployment SPN roles
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Azure Stack HCI Administrator"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
          description: "Deployment SPN - HCI Administrator at subscription"
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Reader"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
          description: "Deployment SPN - Reader at subscription"
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Key Vault Secrets User"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-iic-eus-identity-mgmt/providers/Microsoft.KeyVault/vaults/kv-azlc-mgmt"
          description: "Deployment SPN - Key Vault secrets access"
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Contributor"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-iic-eus-landingzone-cluster"
          description: "Deployment SPN - Contributor at cluster resource group"
        
        # Admin group roles
        - principal_id: "12345678-1234-1234-1234-123456789012"
          principal_type: "Group"
          role_definition_name: "Azure Stack HCI Administrator"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
          description: "Deployment admins group - HCI Administrator"
        - principal_id: "12345678-1234-1234-1234-123456789012"
          principal_type: "Group"
          role_definition_name: "Key Vault Administrator"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-iic-eus-identity-mgmt/providers/Microsoft.KeyVault/vaults/kv-azlc-mgmt"
          description: "Deployment admins group - Key Vault admin"
      
      complete:
        # Enterprise - Full RBAC with conditions and all required roles
        # Deployment SPN - Subscription level
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Azure Stack HCI Administrator"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
          description: "Deployment SPN - Azure Stack HCI Administrator (required)"
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Reader"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
          description: "Deployment SPN - Reader for resource discovery"
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Storage Account Contributor"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
          description: "Deployment SPN - Storage Account management for cloud witness"
        
        # Deployment SPN - Resource group level
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Contributor"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-iic-eus-landingzone-cluster"
          description: "Deployment SPN - Contributor at cluster resource group"
        
        # Deployment SPN - Key Vault specific
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Key Vault Secrets User"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-iic-eus-identity-mgmt/providers/Microsoft.KeyVault/vaults/kv-azlc-mgmt"
          description: "Deployment SPN - Read secrets (domain credentials, SPN secrets)"
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          role_definition_name: "Key Vault Contributor"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-iic-eus-identity-mgmt/providers/Microsoft.KeyVault/vaults/kv-azlc-mgmt"
          description: "Deployment SPN - Manage Key Vault (create secrets during deployment)"
        
        # Deployment admins group - Subscription level
        - principal_id: "12345678-1234-1234-1234-123456789012"
          principal_type: "Group"
          role_definition_name: "Azure Stack HCI Administrator"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
          description: "Deployment admins - HCI Administrator for portal/ARM deployments"
        - principal_id: "12345678-1234-1234-1234-123456789012"
          principal_type: "Group"
          role_definition_name: "User Access Administrator"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
          description: "Deployment admins - Manage RBAC assignments"
          condition: "@Resource[Microsoft.Authorization/roleAssignments:PrincipalType] StringEquals 'ServicePrincipal'"
        
        # Deployment admins group - Key Vault
        - principal_id: "12345678-1234-1234-1234-123456789012"
          principal_type: "Group"
          role_definition_name: "Key Vault Administrator"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-iic-eus-identity-mgmt/providers/Microsoft.KeyVault/vaults/kv-azlc-mgmt"
          description: "Deployment admins - Full Key Vault access"
        
        # Operators group - Read-only
        - principal_id: "23456789-2345-2345-2345-234567890123"
          principal_type: "Group"
          role_definition_name: "Reader"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
          description: "Operators - Read-only subscription access"
        - principal_id: "23456789-2345-2345-2345-234567890123"
          principal_type: "Group"
          role_definition_name: "Azure Stack HCI VM Contributor"
          scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-iic-eus-landingzone-cluster"
          description: "Operators - Manage VMs on Azure Local cluster"

  azl_rbac_validate_before_deployment:
    category: "identity"
    subcategory: "rbac"
    type: boolean
    description: "Validate RBAC assignments before starting Azure Local deployment"
    required: false
    default: true
    note: "Recommended to prevent deployment failures due to missing permissions"

  # Hardware Management Interfaces (iDRAC/BMC)
  account_idrac_username:
    type: string
    description: "iDRAC/BMC username (stored in Key Vault)"
    required: false
    sensitive: true
    example: "root"
    note: "Typically 'root' for Dell iDRAC, 'Administrator' for HPE iLO"

  account_idrac_password:
    type: string
    description: "iDRAC/BMC password (Key Vault reference)"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/idrac-password"

  # iDRAC VNC Remote Console Settings
  idrac_vnc_enabled:
    type: boolean
    description: "Enable VNC on iDRAC for remote console access"
    required: false
    default: true
    example: true
    note: "Enables third-party VNC client access to iDRAC virtual console"

  idrac_vnc_port:
    type: integer
    description: "VNC port number for iDRAC virtual console"
    required: false
    default: 5901
    example: 5901
    note: "Standard VNC port offset from 5900"

  idrac_vnc_timeout:
    type: integer
    description: "VNC session timeout in seconds"
    required: false
    default: 1800
    example: 1800
    note: "30 minutes default timeout for VNC sessions"

  idrac_vnc_password:
    type: string
    description: "VNC password for third-party VNC clients (8 character max)"
    required: false
    sensitive: true
    maxLength: 8
    example: "azl2025!"
    note: "Dell iDRAC VNC passwords are limited to 8 characters"

  idrac_vnc_password_secret:
    type: string
    description: "VNC password Key Vault reference"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/idrac-vnc-password"

  # Cloud Witness Storage Account Key
  cloud_witness_storage_key:
    type: string
    description: "Cloud witness storage account access key (Key Vault reference)"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/cloud-witness-storage-key"

# =============================================================================
# ENVIRONMENT
# =============================================================================

environment:
  env_name:
    type: string
    description: "Environment identifier"
    required: true
    allowedValues:
    - azurelocalcloud
    - iic-production
    - iic-reference
    - iic-poc
    - iic-productlabs
    example: "azurelocalcloud"

  env_type:
    type: string
    description: "Environment type"
    required: true
    allowedValues:
    - management
    - lab
    - demo
    - poc
    - production
    example: "management"

  env_owner:
    type: string
    description: "Environment owner email"
    format: email
    required: false
    example: "platform@improbability.cloud"

  env_description:
    type: string
    description: "Environment description"
    required: false
    example: "Infinite Improbability Cloud Management Platform"

# =============================================================================
# SITE
# =============================================================================

site:
  code:
    type: string
    description: "Site code"
    required: true
    maxLength: 5
    pattern: "^[A-Z]{2,5}$"
    example: "RAL"

  env_name:
    type: string
    description: "Site name"
    required: true
    example: "IIC Datacenter Alpha"

  location:
    type: string
    description: "Physical location"
    required: false
    example: "Raleigh, NC"

  datacenter:
    type: string
    description: "Datacenter code"
    required: false
    example: "RAL"

  site_code:
    type: string
    description: "Site code"
    required: true
    maxLength: 5
    pattern: "^[A-Z]{2,5}$"
    example: "AZL"

  site_datacenter:
    type: string
    description: "Site datacenter"
    required: true
    example: "IIC DC1"

  site_description:
    type: string
    description: "Site description"
    required: true
    example: "Azure Local cluster for IIC CMP"

  site_environment:
    type: string
    description: "Site environment"
    required: true
    example: "Production"

  site_location:
    type: string
    description: "Site location"
    required: true
    example: "Raleigh, NC"

  site_name:
    type: string
    description: "Site name"
    required: true
    example: "Azure Local Cloud"

  site_owner:
    type: string
    description: "Site owner"
    required: true
    example: "Product Technology Team"

# =============================================================================
# TAGS
# =============================================================================

tags:
  Environment:
    type: string
    description: "Environment tag identifying the Azure Local environment"
    required: true
    allowedValues:
    - azurelocalcloud
    - iic-production
    - iic-reference
    - iic-poc
    - iic-productlabs
    example: "azurelocalcloud"

  Project:
    type: string
    description: "Project name tag"
    required: true
    allowedValues:
    - "Azure Local Cloud Management"
    - "Infinite Improbability Corp"
    - "IIC Demos"
    - "IIC POC"
    - "IIC Product Labs"
    example: "Infinite Improbability Cloud Management Platform"

  ManagedBy:
    type: string
    description: "Management tool identifier"
    required: true
    allowedValues:
    - Terraform
    - PowerShell
    - Bicep
    - Ansible
    - "Azure CLI"
    - Manual
    default: "Infrastructure as Code"

  env_Owner:
    type: string
    description: "Owner tag"
    required: true
    example: "Product Technology Team"

  CostCenter:
    type: string
    description: "Cost center tag"
    required: false
    example: "IT-IIC"

  tag_architecture_version:
    category: "operations"
    subcategory: "tagging"
    type: string
    description: "Tag architecture version"
    required: true
    example: "v2.0"

# =============================================================================
# MONITORING & LOG ANALYTICS
# =============================================================================

monitoring:
  monitoring_log_analytics_workspace_name:
    category: "monitoring"
    subcategory: "log-analytics"
    type: string
    description: "Log Analytics workspace name"
    required: false
    pattern: "^law-[a-z0-9-]+$"
    example: "law-azlc-iic-eus-monitoring"

  monitoring_log_analytics_workspace_sku:
    category: "monitoring"
    subcategory: "log-analytics"
    type: string
    description: "Log Analytics workspace SKU"
    required: false
    allowedValues:
    - Free
    - PerGB2018
    - PerNode
    - Premium
    - Standard
    - Standalone
    default: "PerGB2018"

  monitoring_log_analytics_retention_days:
    category: "monitoring"
    subcategory: "retention"
    type: integer
    description: "Log retention in days"
    required: false
    minimum: 30
    maximum: 730
    default: 90

  monitoring_agent_windows_enabled:
    type: boolean
    description: "Enable Azure Monitor Agent on Windows VMs"
    required: false
    default: true

  monitoring_agent_linux_enabled:
    type: boolean
    description: "Enable Azure Monitor Agent on Linux VMs"
    required: false
    default: true

  monitoring_application_insights_name:
    type: string
    description: "Application Insights name"
    required: false
    pattern: "^ai-[a-z0-9-]+$"
    example: "ai-azlc-iic-eus-app"

  monitoring_alert_email_addresses:
    type: array
    description: "Email addresses for alerts"
    required: false
    items:
      type: string
    format: email
    example:
    - "platform@improbability.cloud"

  monitoring_alert_severity_levels:
    type: array
    description: "Alert severity levels to monitor"
    required: false
    items:
      type: integer
    minimum: 0
    maximum: 4
    example:
    - 0
    - 1
    - 2

  monitoring_resource_group:
    type: string
    description: "Monitoring resource group"
    required: false
    pattern: "^rg-[a-z0-9-]+$"
    example: "rg-azlc-iic-eus-management-monitoring"

  monitoring_enabled:
    type: boolean
    description: "Enable Azure Monitor"
    required: false
    default: true

  monitoring_workspace:
    type: string
    description: "Azure Monitor workspace name"
    required: false
    pattern: "^amw-[a-z0-9-]+$"
    example: "amw-azlc-iic-eus"

  # Metrics Configuration
  monitoring_metrics_retention_days:
    type: integer
    description: "Metrics retention days"
    required: true
    example: "90"

  # Data Collection Rules (DCR)
  monitoring_windows_performance_dcr_name:
    type: string
    description: "Windows performance data collection rule name"
    required: false
    pattern: "^dcr-[a-z0-9-]+$"
    example: "dcr-azlc-iic-eus-winperf"

  windows_events_dcr_name:
    type: string
    description: "Windows events data collection rule name"
    required: false
    pattern: "^dcr-[a-z0-9-]+$"
    example: "dcr-azlc-iic-eus-winevents"

  monitoring_performance_counter_sampling_frequency:
    type: integer
    description: "Performance counter sampling frequency (seconds)"
    required: false
    minimum: 10
    maximum: 3600
    default: 60

  monitoring_dcr_destination_table:
    type: string
    description: "Log Analytics workspace table name for data collection rule output data. Use standard tables (Perf, Event, Syslog) or custom tables with _CL suffix for custom log data"
    required: false
    pattern: "^[A-Za-z][A-Za-z0-9_]*(_CL)?$"
    example: "Perf"

  monitoring_dcr_linux_syslog_facilities:
    type: array
    description: "Linux syslog facilities"
    required: false
    items:
      type: string
    example:
    - "[\"auth\", \"authpriv\", \"cron\"]"

  monitoring_dcr_linux_syslog_log_levels:
    type: array
    description: "Linux syslog log levels"
    required: false
    items:
      type: string
    example:
    - "[\"Emergency\", \"Alert\", \"Critical\"]"

  monitoring_dcr_linux_syslog_name:
    type: string
    description: "Linux syslog DCR name"
    required: false
    example: "dcr-linux-syslog"

  monitoring_dcr_windows_events_logs:
    type: array
    description: "Windows event logs"
    required: false
    items:
      type: string
    example:
    - "[\"System\", \"Application\"]"

  monitoring_dcr_windows_events_name:
    type: string
    description: "Windows events DCR name"
    required: false
    example: "dcr-windows-events"

  monitoring_dcr_windows_perf_counters:
    type: array
    description: "Windows performance counters"
    required: false
    items:
      type: string
    example:
    - "[\"\\\\Processor(_Total)\\\\% Processor Time\"]"

  monitoring_dcr_windows_perf_name:
    type: string
    description: "Windows performance DCR name"
    required: false
    example: "dcr-windows-perf"

  # Alert Configuration
  monitoring_alert_action_group_name:
    type: string
    description: "Alert action group name"
    required: false
    example: "ag-azlc-iic-alerts"

