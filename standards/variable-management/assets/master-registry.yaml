# =============================================================================
# ON-PREM NETWORKING - DHCP
# =============================================================================

dhcp:
  infrastructure_type: ["azure_local", "wsfc_s2d", "wsfc_san"]
  # DHCP SERVICE CONFIGURATION (Platform-Agnostic)
  # ---------------------------------------------------------------------------
  dhcp_service_enabled:
    type: boolean
    description: "Enable DHCP service globally"
    required: false
    default: true

  dhcp_service_platform:
    type: string
    description: "DHCP service platform"
    required: false
    options:
    - "windows_server"
    - "fortigate"
    - "cisco_ios"
    - "linux_isc_dhcp"
    - "infoblox"
    example: "fortigate"

  dhcp_server_ip:
    type: string
    description: "DHCP server IP address (for relay/helper configuration)"
    required: false
    format: ipv4
    example: "192.168.211.5"

  # DHCP SCOPES (Array-Based, Multiple Scopes per Network)
  # ---------------------------------------------------------------------------
  dhcp_scopes:
    type: array
    description: "DHCP scopes for all networks (platform-agnostic)"
    required: false
    items:
      type: object
      properties:
        scope_name:
          type: string
        vlan_id:
          type: integer
        network:
          type: string
          format: cidr
        subnet_mask:
          type: string
          format: ipv4
        gateway:
          type: string
          format: ipv4
        range_start:
          type: string
          format: ipv4
        range_end:
          type: string
          format: ipv4
        dns_servers:
          type: array
          items:
            type: string
            format: ipv4
        domain_name:
          type: string
        ntp_servers:
          type: array
          items:
            type: string
            format: ipv4
        lease_time:
          type: integer
        enabled:
          type: boolean
        reservations:
          type: array
          items:
            type: object
            properties:
              mac_address:
                type: string
              ip_address:
                type: string
                format: ipv4
              hostname:
                type: string
        exclusions:
          type: array
          items:
            type: object
            properties:
              start_ip:
                type: string
                format: ipv4
              end_ip:
                type: string
                format: ipv4
    example:
    - scope_name: "management-compute"
      vlan_id: 211
      network: "192.168.211.0/24"
      subnet_mask: "255.255.255.0"
      gateway: "192.168.211.1"
      range_start: "192.168.211.100"
      range_end: "192.168.211.200"
      dns_servers: ["10.100.1.36", "10.100.1.37"]
      domain_name: "azlocal.cloud"
      ntp_servers: ["10.100.1.36"]
      lease_time: 86400
      enabled: true
      reservations:
        - mac_address: "00:15:5D:00:00:01"
          ip_address: "192.168.211.10"
          hostname: "azlc-node01"
      exclusions:
        - start_ip: "192.168.211.1"
          end_ip: "192.168.211.50"
    - scope_name: "workload-web"
      vlan_id: 501
      network: "192.168.100.0/24"
      subnet_mask: "255.255.255.0"
      gateway: "192.168.100.1"
      range_start: "192.168.100.100"
      range_end: "192.168.100.200"
      dns_servers: ["10.100.1.36", "10.100.1.37"]
      domain_name: "azlocal.cloud"
      lease_time: 43200
      enabled: true

  # MANAGEMENT-COMPUTE DHCP SCOPE
  # ---------------------------------------------------------------------------
  dhcp_management_compute_enabled:
    type: boolean
    description: "Enable DHCP for management-compute network"
    required: false
    default: true

  dhcp_management_compute_range_start:
    type: string
    description: "Management-compute DHCP range start"
    required: false
    format: ipv4
    example: "192.168.211.100"

  dhcp_management_compute_range_end:
    type: string
    description: "Management-compute DHCP range end"
    required: false
    format: ipv4
    example: "192.168.211.200"

  dhcp_management_compute_lease_time:
    type: integer
    description: "Management-compute DHCP lease time (seconds)"
    required: false
    minimum: 300
    maximum: 31536000
    default: 86400

  dhcp_management_compute_dns_servers:
    type: array
    description: "Management-compute DHCP DNS servers"
    required: false
    items:
      type: string
    format: ipv4
    example:
    - "10.100.1.36"
    - "10.100.1.37"

  dhcp_management_compute_domain:
    type: string
    description: "Management-compute DHCP domain name"
    required: false
    example: "azlocal.cloud"

  dhcp_management_compute_ntp_servers:
    type: array
    description: "Management-compute DHCP NTP servers"
    required: false
    items:
      type: string
    format: ipv4
    example:
    - "10.100.1.36"

  dhcp_management_compute_exclusions:
    type: array
    description: "Management-compute DHCP exclusion ranges"
    required: false
    items:
      type: object
      properties:
        start_ip:
          type: string
          format: ipv4
        end_ip:
          type: string
          format: ipv4
    example:
    - start_ip: "192.168.211.1"
      end_ip: "192.168.211.50"  # OUT-OF-BAND DHCP SCOPE
  # ---------------------------------------------------------------------------
  dhcp_oob_enabled:
    type: boolean
    description: "Enable DHCP for out-of-band network"
    required: false
    default: true

  dhcp_oob_range_start:
    type: string
    description: "Out-of-band DHCP range start"
    required: false
    format: ipv4
    example: "192.168.210.100"

  dhcp_oob_range_end:
    type: string
    description: "Out-of-band DHCP range end"
    required: false
    format: ipv4
    example: "192.168.210.200"

  dhcp_oob_lease_time:
    type: integer
    description: "Out-of-band DHCP lease time (seconds)"
    required: false
    minimum: 300
    maximum: 31536000
    default: 86400

  dhcp_oob_dns_servers:
    type: array
    description: "Out-of-band DHCP DNS servers"
    required: false
    items:
      type: string
    format: ipv4
    example:
    - "8.8.8.8"
    - "8.8.4.4"

  # WORKLOAD DHCP SCOPES (1-6)
  # ---------------------------------------------------------------------------
  dhcp_workload_1_enabled:
    type: boolean
    description: "Enable DHCP for workload network 1"
    required: false
    default: false

  dhcp_workload_1_range_start:
    type: string
    description: "Workload 1 DHCP range start"
    required: false
    format: ipv4
    example: "192.168.100.100"

  dhcp_workload_1_range_end:
    type: string
    description: "Workload 1 DHCP range end"
    required: false
    format: ipv4
    example: "192.168.100.200"

  dhcp_workload_1_lease_time:
    type: integer
    description: "DHCP lease duration in seconds for workload network 1 (recommended: 86400 for static devices, 3600 for dynamic clients)"
    required: false
    minimum: 600
    maximum: 2592000
    default: 43200
    note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

  dhcp_workload_2_enabled:
    type: boolean
    description: "Enable DHCP for workload network 2"
    required: false
    default: false

  dhcp_workload_2_range_start:
    type: string
    description: "Workload 2 DHCP range start"
    required: false
    format: ipv4
    example: "192.168.51.100"

  dhcp_workload_2_range_end:
    type: string
    description: "Workload 2 DHCP range end"
    required: false
    format: ipv4
    example: "192.168.51.200"

  dhcp_workload_2_lease_time:
    type: integer
    description: "DHCP lease duration in seconds for workload network 2 (recommended: 86400 for static devices, 3600 for dynamic clients)"
    required: false
    minimum: 600
    maximum: 2592000
    default: 43200
    note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

  dhcp_workload_3_enabled:
    type: boolean
    description: "Enable DHCP for workload network 3"
    required: false
    default: false

  dhcp_workload_3_range_start:
    type: string
    description: "Workload 3 DHCP range start"
    required: false
    format: ipv4
    example: "192.168.52.100"

  dhcp_workload_3_range_end:
    type: string
    description: "Workload 3 DHCP range end"
    required: false
    format: ipv4
    example: "192.168.52.200"

  dhcp_workload_3_lease_time:
    type: integer
    description: "DHCP lease duration in seconds for workload network 3 (recommended: 86400 for static devices, 3600 for dynamic clients)"
    required: false
    minimum: 600
    maximum: 2592000
    default: 43200
    note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

  dhcp_workload_4_enabled:
    type: boolean
    description: "Enable DHCP for workload network 4"
    required: false
    default: false

  dhcp_workload_4_range_start:
    type: string
    description: "Workload 4 DHCP range start"
    required: false
    format: ipv4
    example: "192.168.53.100"

  dhcp_workload_4_range_end:
    type: string
    description: "Workload 4 DHCP range end"
    required: false
    format: ipv4
    example: "192.168.53.200"

  dhcp_workload_4_lease_time:
    type: integer
    description: "DHCP lease duration in seconds for workload network 4 (recommended: 86400 for static devices, 3600 for dynamic clients)"
    required: false
    minimum: 600
    maximum: 2592000
    default: 43200
    note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

  dhcp_workload_5_enabled:
    type: boolean
    description: "Enable DHCP for workload network 5"
    required: false
    default: false

  dhcp_workload_5_range_start:
    type: string
    description: "Workload 5 DHCP range start"
    required: false
    format: ipv4
    example: "192.168.54.100"

  dhcp_workload_5_range_end:
    type: string
    description: "Workload 5 DHCP range end"
    required: false
    format: ipv4
    example: "192.168.54.200"

  dhcp_workload_5_lease_time:
    type: integer
    description: "DHCP lease duration in seconds for workload network 5 (recommended: 86400 for static devices, 3600 for dynamic clients)"
    required: false
    minimum: 600
    maximum: 2592000
    default: 43200
    note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

  dhcp_workload_6_enabled:
    type: boolean
    description: "Enable DHCP for workload network 6"
    required: false
    default: false

  dhcp_workload_6_range_start:
    type: string
    description: "Workload 6 DHCP range start"
    required: false
    format: ipv4
    example: "192.168.55.100"

  dhcp_workload_6_range_end:
    type: string
    description: "Workload 6 DHCP range end"
    required: false
    format: ipv4
    example: "192.168.55.200"

  dhcp_workload_6_lease_time:
    type: integer
    description: "DHCP lease duration in seconds for workload network 6 (recommended: 86400 for static devices, 3600 for dynamic clients)"
    required: false
    minimum: 600
    maximum: 2592000
    default: 43200
    note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

  # DHCP RESERVATIONS (Global)
  # ---------------------------------------------------------------------------
  dhcp_reservations:
    type: array
    description: "DHCP reservations across all scopes"
    required: false
    items:
      type: object
      properties:
        scope_name:
          type: string
        mac_address:
          type: string
          pattern: "^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$"
        ip_address:
          type: string
          format: ipv4
        hostname:
          type: string
        description:
          type: string
    example:
    - scope_name: "management-compute"
      mac_address: "00:15:5D:00:00:01"
      ip_address: "192.168.211.10"
      hostname: "azlc-node01"
      description: "Azure Local Node 1"
    - scope_name: "management-compute"
      mac_address: "00:15:5D:00:00:02"
      ip_address: "192.168.211.11"
      hostname: "azlc-node02"
      description: "Azure Local Node 2"  # DHCP OPTIONS (Global)
  # ---------------------------------------------------------------------------
  dhcp_option_domain_name:
    type: string
    description: "DHCP option 15 - Domain name"
    required: false
    example: "azlocal.cloud"

  dhcp_option_tftp_server:
    type: string
    description: "DHCP option 66 - TFTP server (for PXE boot)"
    required: false
    format: ipv4
    example: "192.168.211.5"

  dhcp_option_bootfile_name:
    type: string
    description: "DHCP option 67 - Bootfile name (for PXE boot)"
    required: false
    example: "pxeboot.n12"

  dhcp_relay_agent_enabled:
    type: boolean
    description: "Enable DHCP relay agent (IP helper)"
    required: false
    default: false

  dhcp_relay_server_ips:
    type: array
    description: "DHCP relay server IP addresses"
    required: false
    items:
      type: string
    format: ipv4
    example:
    - "192.168.211.5"


# =============================================================================
# CLUSTERS (ORCHESTRATION & MANAGEMENT)
# =============================================================================
# Parent section for cluster orchestration technologies. Contains both Azure
# Local (modern hyper-converged infrastructure) and Windows Server Failover
# Clustering (traditional clustering) configurations.
#
# CHILD SECTIONS:
#   - azure_local: Azure Local clusters (formerly Azure Stack HCI)
#   - wsfc: Windows Server Failover Clustering
#
# SHARED INFRASTRUCTURE:
#   - cluster_nodes: (line 5218+) Generic physical node configurations used by both technologies

clusters:

  # ===========================================================================
  # AZURE LOCAL CLUSTER
  # ===========================================================================
  # Azure Local (formerly Azure Stack HCI) is Microsoft's hyper-converged
  # infrastructure solution that extends Azure services to on-premises
  # environments. Supports 1-16 node clusters with Storage Spaces Direct.

  azure_local:
    infrastructure_type: ["azure_local"]
    # CLUSTER IDENTIFICATION
    # -------------------------------------------------------------------------
    azl_name:
      type: string
      description: "Azure Local cluster name (NetBIOS name, max 15 characters)"
      required: true
      maxLength: 15
      pattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
      example: "azlc-clus01"

    azl_resource_group:
      type: string
      description: "Cluster resource group (function-based naming)"
      required: true
      pattern: "^rg-[a-z0-9]+-(iic|demo|poc|lab)-[a-z0-9]+-(landingzone|management)-cluster$"
      example: "rg-azlc-iic-eus-landingzone-cluster"

    azl_subscription:
      type: string
      description: "Azure subscription ID for cluster resources"
      required: true
      format: uuid
      example: "00000000-1111-2222-3333-444444444444"

    azl_location:
      type: string
      description: "Azure region for cluster registration"
      required: true
      allowedValues:
      - "East US"
      - "West Europe"
      - "Australia East"
      - "Southeast Asia"
      - "India Central"
      - "Canada Central"
      - "Japan East"
      - "South Central US"
      example: "East US"

    azl_rack:
      type: string
      description: "Physical rack location identifier"
      required: false
      example: "RAL-R001"

    azl_environment:
      type: string
      description: "Deployment environment type"
      required: false
      allowedValues:
      - production
      - development
      - testing
      - staging
      default: "production"

    azl_custom_location_name:
      category: "azure-local"
      subcategory: "cluster-config"
      type: string
      description: "Custom location name for Arc resource bridge"
      required: false
      example: "azlc-custom-location"

    # CLUSTER SIZE AND CONFIGURATION
    # ---------------------------------------------------------------------------
    azl_node_count:
      category: "azure-local"
      subcategory: "cluster-size"
      type: integer
      description: "Number of nodes in the cluster (Microsoft sweet spot: 6 nodes)"
      required: true
      minimum: 1
      maximum: 16
      example: 6

    # STORAGE TOPOLOGY (Switchless vs Switched)
    # ---------------------------------------------------------------------------
    azl_storage_topology:
      category: "azure-local"
      subcategory: "storage-topology"
      type: string
      description: "Storage network topology (switchless: 1-4 nodes only, switched: 4-16 nodes, scale-out requires switched)"
      required: true
      allowedValues:
      - switchless
      - switched
      example: "switched"

    azl_storage_switchless_node_limit:
      type: integer
      description: "Maximum nodes for switchless storage (read-only reference)"
      required: false
      minimum: 1
      maximum: 4
      default: 4

    azl_storage_rdma_enabled:
      type: boolean
      description: "Enable RDMA for storage traffic (requires 10Gbps+ adapters)"
      required: false
      default: true

    azl_storage_rdma_technology:
      type: string
      description: "RDMA technology for storage"
      required: false
      allowedValues:
      - RoCEv2
      - iWARP
      default: "RoCEv2"

    # IDENTITY PROVIDER (Active Directory vs Local Identity with Key Vault)
    # ---------------------------------------------------------------------------
    azl_identity_provider:
      type: string
      description: "Identity provider (active_directory: use active_directory section, local_identity: use per-cluster Key Vault)"
      required: true
      allowedValues:
      - active_directory
      - local_identity
      example: "active_directory"

    # NOTE: For active_directory provider, use variables from active_directory: section (ad_domain_fqdn, ad_ou_path)

    # Local Identity with Key Vault Settings
    azl_local_identity_key_vault_name:
      category: "security"
      subcategory: "keyvault"
      type: string
      description: "Key Vault name for local identity secrets (required for local_identity provider, one per cluster)"
      required: false
      depends_on:
      - variable: "azl_identity_provider"
        condition: "equals: local_identity"
        message: "Key Vault name required when using local_identity provider"
      minLength: 3
      maxLength: 24
      pattern: "^[a-z][a-z0-9]+(-[a-z0-9]+)*$"
      note: "No consecutive hyphens allowed"
      example: "kv-azlc-cluster01"

    azl_local_identity_key_vault_resource_group:
      type: string
      description: "Resource group for Key Vault (function-based naming: identity or management function)"
      required: false
      depends_on:
      - variable: "azl_identity_provider"
        condition: "equals: local_identity"
        message: "Key Vault resource group required when using local_identity provider"
      pattern: "^rg-[a-z0-9]+-(iic|demo|poc|lab)-[a-z0-9]+-(identity|management)-keyvault$"
      example: "rg-azlc-iic-eus-identity-keyvault"

    azl_local_identity_recovery_admin_username:
      type: string
      description: "Recovery admin username for local identity deployments (password stored in Key Vault)"
      required: false
      depends_on:
      - variable: "azl_identity_provider"
        condition: "equals: local_identity"
        message: "Recovery admin username only applies to local_identity provider"
      default: "RecoveryAdmin"

    azl_local_identity_zone_name:
      type: string
      description: "DNS zone name for local identity deployment (must be resolvable internally or externally)"
      required: false
      depends_on:
      - variable: "azl_identity_provider"
        condition: "equals: local_identity"
        message: "DNS zone name required when using local_identity provider"
      example: "azlocal.cloud"

    # NOTE: For network intents, use network_intents: array section (line 5578)

    # CLUSTER WITNESS (Quorum Configuration)
    # ---------------------------------------------------------------------------
    azl_witness_type:
      type: string
      description: "Cluster witness type (cloud_witness: Azure Storage, file_share_witness: SMB share, disk_witness: shared disk)"
      required: true
      allowedValues:
      - cloud_witness
      - file_share_witness
      - disk_witness
      default: "cloud_witness"

    # File Share Witness Configuration
    azl_witness_file_share_path:
      type: string
      description: "File share path for witness (UNC path, minimum 5MB free space)"
      required: false
      format: unc_path
      example: "\\\\fileserver.azlocal.cloud\\witness"

    # Disk Witness Configuration (not supported for Storage Spaces Direct)
    azl_witness_disk_resource:
      type: string
      description: "Disk resource name for witness (not supported with Storage Spaces Direct)"
      required: false
      example: "Cluster Disk 3"

    # AZURE ARC AND CONNECTIVITY
    # ---------------------------------------------------------------------------
    azl_arc_gateway_enabled:
      type: boolean
      description: "Use Arc gateway for proxy/restricted environments"
      required: false
      default: false

    azl_arc_gateway_name:
      category: "azure-local"
      subcategory: "arc-gateway"
      type: string
      description: "Arc gateway name (if using Arc gateway)"
      required: false
      depends_on:
      - variable: "azl_arc_gateway_enabled"
        condition: "equals: true"
        message: "Arc gateway name required when Arc gateway is enabled"
      example: "azlc-arc-gateway"

    azl_arc_gateway_resource_group:
      type: string
      description: "Arc gateway resource group (function-based naming: connectivity function)"
      required: false
      depends_on:
      - variable: "azl_arc_gateway_enabled"
        condition: "equals: true"
        message: "Arc gateway resource group required when Arc gateway is enabled"
      pattern: "^rg-[a-z0-9]+-(iic|demo|poc|lab)-[a-z0-9]+-(connectivity|management)-arcgw$"
      example: "rg-azlc-iic-eus-connectivity-arcgw"

    azl_arc_gateway_id:
      type: string
      description: "Arc gateway resource ID (required when azl_arc_gateway_enabled is true)"
      required: false
      depends_on:
      - variable: "azl_arc_gateway_enabled"
        condition: "equals: true"
        message: "Arc gateway resource ID required when Arc gateway is enabled"
      format: azure_resource_id
      example: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-iic-eus-connectivity-arcgw/providers/Microsoft.HybridCompute/gateways/azlc-arc-gateway"

    # STORAGE SPACES DIRECT PHYSICAL DRIVES
    # ---------------------------------------------------------------------------
    # Physical storage configuration for Storage Spaces Direct (S2D).
    # Azure storage accounts for witness and diagnostics are in the storage: section.

    # Cache Tier Configuration
    azl_cache_drive_type:
      type: string
      description: "Physical cache drive type for Storage Spaces Direct"
      required: false
      allowedValues:
      - SSD
      - NVMe
      example: "SSD"

    azl_cache_drives_count:
      type: integer
      description: "Number of cache drives per node"
      required: false
      minimum: 1
      maximum: 16
      example: 2

    azl_cache_drives_size_gb:
      type: integer
      description: "Size of each cache drive in GB"
      required: false
      minimum: 128
      maximum: 8192
      example: 960

    # Capacity Tier Configuration
    azl_capacity_drive_type:
      type: string
      description: "Physical capacity drive type for Storage Spaces Direct"
      required: false
      allowedValues:
      - HDD
      - SSD
      - NVMe
      example: "HDD"

    azl_capacity_drives_count:
      type: integer
      description: "Number of capacity drives per node"
      required: false
      minimum: 4
      maximum: 64
      example: 8

    azl_capacity_drives_size_gb:
      type: integer
      description: "Size of each capacity drive in GB"
      required: false
      minimum: 1000
      maximum: 16384
      example: 4000

    # ===========================================================================
    # WINDOWS SERVER FAILOVER CLUSTER (WSFC)
    # ===========================================================================
    # Windows Server Failover Clustering for non-Azure Local deployments.
    # Supports multiple storage architectures and Windows Server versions.
    #
    # STORAGE ARCHITECTURE OPTIONS:
    #   - S2D (Storage Spaces Direct): Hyper-converged storage using local drives
    #   - SAN: Traditional shared storage (iSCSI, Fibre Channel, FCoE)
    #   - Hybrid: Mix of local and shared storage
    #
    # SUPPORTED OS VERSIONS:
    #   - Windows Server 2019 (Build 17763)
    #   - Windows Server 2022 (Build 20348)
    #   - Windows Server 2025 (Build 26100)
    #
    # RELATED SECTIONS:
    #   - cluster_nodes: (line 5218+) - Physical node configurations
    #   - vlans: (line 3480+) - VLAN definitions for cluster networking
    #   - storage: (line 7800+) - Azure storage accounts for witness/diagnostics
    #   - failover_cluster: (line 8656+) - Legacy failover cluster variables

  wsfc:
    infrastructure_type: ["wsfc_s2d", "wsfc_san"]
    # -------------------------------------------------------------------------
    # CLUSTER IDENTIFICATION
    # -------------------------------------------------------------------------
    wsfc_cluster_name:
      type: string
      description: "Windows Server Failover Cluster name (NetBIOS name, 15 chars max)"
      required: true
      minLength: 1
      maxLength: 15
      pattern: "^[a-zA-Z0-9-]+$"
      example: "WSFC-CLUS01"

    wsfc_cluster_ip:
      type: string
      description: "Cluster IP address (static IP for cluster name object)"
      required: true
      format: ipv4
      example: "192.168.211.50"

    wsfc_domain_fqdn:
      type: string
      description: "Active Directory domain FQDN for cluster"
      required: true
      format: fqdn
      example: "corp.Infinite Improbability Corp.com"

    wsfc_ou_path:
      type: string
      description: "Active Directory OU path for cluster objects"
      required: false
      format: ldap_dn
      example: "OU=Clusters,OU=Servers,DC=corp,DC=Infinite Improbability Corp,DC=com"

    wsfc_description:
      type: string
      description: "Cluster description for documentation"
      required: false
      maxLength: 256
      example: "Production Hyper-V Failover Cluster"

    wsfc_environment:
      type: string
      description: "Environment type (production, staging, development, test)"
      required: false
      allowedValues:
      - production
      - staging
      - development
      - test
      default: "production"

    # ---------------------------------------------------------------------------
    # OPERATING SYSTEM VERSION
    # ---------------------------------------------------------------------------
    wsfc_os_version:
      type: string
      description: "Windows Server version for cluster nodes"
      required: true
      allowedValues:
      - Server2019
      - Server2022
      - Server2025
      example: "Server2022"
      references:
      - url: "https://learn.microsoft.com/windows-server/get-started/editions-comparison"

    wsfc_os_build:
      type: string
      description: "Specific OS build number (optional, for tracking updates)"
      required: false
      pattern: "^[0-9]+\\.[0-9]+$"
      example: "20348.2227"

    wsfc_os_edition:
      type: string
      description: "Windows Server edition (Datacenter required for S2D)"
      required: true
      allowedValues:
      - Datacenter
      - Standard
      default: "Datacenter"
      note: "Datacenter edition required for Storage Spaces Direct and unlimited VMs"

    wsfc_os_installation_type:
      type: string
      description: "Installation type (ServerCore recommended for production)"
      required: false
      allowedValues:
      - ServerCore
      - DesktopExperience
      default: "ServerCore"

    wsfc_cluster_functional_level:
      type: integer
      description: "Cluster functional level (matches OS version: 2019=10, 2022=11, 2025=12)"
      required: false
      minimum: 10
      maximum: 12
      example: 11

    # ---------------------------------------------------------------------------
    # STORAGE ARCHITECTURE
    # ---------------------------------------------------------------------------
    wsfc_storage_type:
      type: string
      description: "Storage architecture type for cluster"
      required: true
      allowedValues:
      - s2d
      - san
      - hybrid
      example: "s2d"

    # STORAGE SPACES DIRECT (S2D) CONFIGURATION
    # ---------------------------------------------------------------------------
    wsfc_s2d_enabled:
      type: boolean
      description: "Enable Storage Spaces Direct (requires wsfc_storage_type = s2d)"
      required: false
      depends_on:
      - variable: "wsfc_storage_type"
        value: "s2d"
      default: false

    wsfc_s2d_cache_mode:
      type: string
      description: "S2D cache tier behavior (ReadWrite: cache reads and writes, ReadOnly: cache reads only, WriteOnly: cache writes only)"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      allowedValues:
      - ReadWrite
      - ReadOnly
      - WriteOnly
      default: "ReadWrite"

    wsfc_s2d_cache_page_size_kbytes:
      type: integer
      description: "S2D cache page size in KB (8, 16, 32, or 64)"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      allowedValues:
      - 8
      - 16
      - 32
      - 64
      default: 16

    wsfc_s2d_resiliency_default:
      type: string
      description: "Default resiliency setting for S2D volumes"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      allowedValues:
      - Mirror
      - Parity
      - MirrorAcceleratedParity
      default: "Mirror"

    wsfc_s2d_mirror_resiliency_type:
      type: string
      description: "Mirror resiliency type (TwoWay: 2-copy mirror, ThreeWay: 3-copy mirror)"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      allowedValues:
      - TwoWay
      - ThreeWay
      default: "TwoWay"
      note: "ThreeWay requires minimum 5 nodes"

    wsfc_s2d_filesystem:
      type: string
      description: "Default filesystem for S2D volumes (ReFS recommended for S2D)"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      allowedValues:
      - ReFS
      - NTFS
      default: "ReFS"

    wsfc_s2d_cache_metadata_reserve_gb:
      type: integer
      description: "Cache metadata reserve in GB (1-100)"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      minimum: 1
      maximum: 100
      default: 1

    # STORAGE SPACES DIRECT - PHYSICAL DRIVES
    # ---------------------------------------------------------------------------
    wsfc_s2d_cache_drive_type:
      type: string
      description: "Physical cache drive type for S2D"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      allowedValues:
      - SSD
      - NVMe
      example: "SSD"

    wsfc_s2d_cache_drives_per_node:
      type: integer
      description: "Number of cache drives per node"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      minimum: 1
      maximum: 16
      example: 2

    wsfc_s2d_cache_drive_size_gb:
      type: integer
      description: "Size of each cache drive in GB"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      minimum: 128
      maximum: 8192
      example: 960

    wsfc_s2d_capacity_drive_type:
      type: string
      description: "Physical capacity drive type for S2D"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      allowedValues:
      - HDD
      - SSD
      - NVMe
      example: "HDD"

    wsfc_s2d_capacity_drives_per_node:
      type: integer
      description: "Number of capacity drives per node"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      minimum: 4
      maximum: 64
      example: 8

    wsfc_s2d_capacity_drive_size_gb:
      type: integer
      description: "Size of each capacity drive in GB"
      required: false
      depends_on:
      - variable: "wsfc_s2d_enabled"
        value: true
      minimum: 1000
      maximum: 16384
      example: 4000

    # SAN STORAGE CONFIGURATION
    # ---------------------------------------------------------------------------
    wsfc_san_enabled:
      type: boolean
      description: "Enable SAN/shared storage (requires wsfc_storage_type = san)"
      required: false
      depends_on:
      - variable: "wsfc_storage_type"
        value: "san"
      default: false

    wsfc_san_connection_type:
      type: string
      description: "SAN connection type"
      required: false
      depends_on:
      - variable: "wsfc_san_enabled"
        value: true
      allowedValues:
      - iscsi
      - fibre_channel
      - fcoe
      example: "iscsi"

    wsfc_san_vendor:
      type: string
      description: "SAN vendor/manufacturer"
      required: false
      depends_on:
      - variable: "wsfc_san_enabled"
        value: true
      example: "Dell EMC"

    wsfc_san_model:
      type: string
      description: "SAN model/array type"
      required: false
      depends_on:
      - variable: "wsfc_san_enabled"
        value: true
      example: "PowerStore 500T"

    wsfc_san_mpio_enabled:
      type: boolean
      description: "Enable Multipath I/O (MPIO) for SAN connections"
      required: false
      depends_on:
      - variable: "wsfc_san_enabled"
        value: true
      default: true

    wsfc_san_mpio_policy:
      type: string
      description: "MPIO load balancing policy"
      required: false
      depends_on:
      - variable: "wsfc_san_mpio_enabled"
        value: true
      allowedValues:
      - RoundRobin
      - LeastQueueDepth
      - WeightedPaths
      - FailOver
      default: "RoundRobin"

    # iSCSI Configuration
    wsfc_san_iscsi_target_portal:
      type: string
      description: "iSCSI target portal IP address"
      required: false
      depends_on:
      - variable: "wsfc_san_connection_type"
        value: "iscsi"
      format: ipv4
      example: "192.168.100.10"

    wsfc_san_iscsi_target_iqn:
      type: string
      description: "iSCSI target IQN (iSCSI Qualified Name)"
      required: false
      depends_on:
      - variable: "wsfc_san_connection_type"
        value: "iscsi"
      pattern: "^iqn\\.[0-9]{4}-[0-9]{2}\\.[a-z0-9.-]+:[a-z0-9.-]+$"
      example: "iqn.1992-04.com.emc:storage.array.12345"

    wsfc_san_iscsi_port:
      type: integer
      description: "iSCSI target port (default 3260)"
      required: false
      depends_on:
      - variable: "wsfc_san_connection_type"
        value: "iscsi"
      default: 3260

    wsfc_san_iscsi_chap_enabled:
      type: boolean
      description: "Enable CHAP authentication for iSCSI"
      required: false
      depends_on:
      - variable: "wsfc_san_connection_type"
        value: "iscsi"
      default: true

    # Fibre Channel Configuration
    wsfc_san_fc_hba_count:
      type: integer
      description: "Number of Fibre Channel HBAs per node"
      required: false
      depends_on:
      - variable: "wsfc_san_connection_type"
        value: "fibre_channel"
      minimum: 1
      maximum: 4
      example: 2

    wsfc_san_fc_fabric_type:
      type: string
      description: "Fibre Channel fabric topology"
      required: false
      depends_on:
      - variable: "wsfc_san_connection_type"
        value: "fibre_channel"
      allowedValues:
      - single_fabric
      - dual_fabric
      default: "dual_fabric"

    # SAN LUN Configuration
    wsfc_san_luns:
      type: array
      description: "Array of SAN LUNs for cluster storage"
      required: false
      depends_on:
        - variable: "wsfc_san_enabled"
          value: true
      items:
        type: object
        properties:
          lun_id:
            type: integer
            description: "LUN ID"
          lun_name:
            type: string
            description: "LUN name/label"
          size_gb:
            type: integer
            description: "LUN size in GB"
          purpose:
            type: string
            description: "LUN purpose (quorum, csv, vm_storage)"
        example:
          - lun_id: 0
            lun_name: "cluster-quorum"
            size_gb: 10
            purpose: "quorum"
          - lun_id: 1
            lun_name: "csv-volume1"
            size_gb: 2000
            purpose: "csv"

    # ---------------------------------------------------------------------------
    # CLUSTER NETWORKING
    # ---------------------------------------------------------------------------
    wsfc_network_priority:
      type: array
      description: "Network priority order for cluster communications (1=highest)"
      required: false
      items:
        type: string
      example:
        - "Management-Compute"
        - "Storage-1"

    wsfc_csv_network:
      type: string
      description: "Preferred network for CSV traffic"
      required: false
      example: "Storage-1"

    wsfc_live_migration_network:
      type: string
      description: "Preferred network for live migration traffic"
      required: false
      example: "Storage-1"

    wsfc_network_encryption:
      type: boolean
      description: "Enable cluster network encryption (Windows Server 2022+)"
      required: false
      default: false

    # ---------------------------------------------------------------------------
    # CLUSTER SHARED VOLUMES (CSV)
    # ---------------------------------------------------------------------------
    wsfc_csv_enabled:
      type: boolean
      description: "Enable Cluster Shared Volumes"
      required: false
      default: true

    wsfc_csv_cache_enabled:
      type: boolean
      description: "Enable CSV in-memory read cache"
      required: false
      depends_on:
      - variable: "wsfc_csv_enabled"
        value: true
      default: false

    wsfc_csv_cache_size_mb:
      type: integer
      description: "CSV cache size in MB (512-8192)"
      required: false
      depends_on:
      - variable: "wsfc_csv_cache_enabled"
        value: true
      minimum: 512
      maximum: 8192
      default: 1024

    wsfc_csv_block_cache:
      type: boolean
      description: "Enable CSV block cache for ReFS volumes (Windows Server 2016+)"
      required: false
      depends_on:
        - variable: "wsfc_csv_enabled"
          value: true
      default: true

    wsfc_csv_volumes:
      type: array
      description: "Array of CSV volume configurations"
      required: false
      depends_on:
        - variable: "wsfc_csv_enabled"
          value: true
      items:
        type: object
        properties:
          volume_name:
            type: string
            description: "CSV volume name"
          size_gb:
            type: integer
            description: "Volume size in GB"
          filesystem:
            type: string
            description: "Filesystem (ReFS or NTFS)"
          resiliency:
            type: string
            description: "S2D resiliency type (Mirror, Parity)"
        example:
          - volume_name: "CSV01"
            size_gb: 2000
            filesystem: "ReFS"
            resiliency: "Mirror"

    # ---------------------------------------------------------------------------
    # QUORUM CONFIGURATION
    # ---------------------------------------------------------------------------
    wsfc_quorum_type:
      type: string
      description: "Cluster quorum configuration type"
      required: true
      allowedValues:
      - node_majority
      - node_and_disk_majority
      - node_and_file_share_majority
      - cloud_witness
      default: "cloud_witness"

    # Disk Witness (not supported with S2D)
    wsfc_quorum_disk_resource:
      type: string
      description: "Disk witness resource name (not supported with S2D)"
      required: false
      depends_on:
      - variable: "wsfc_quorum_type"
        value: "node_and_disk_majority"
      example: "Cluster Disk 1"

    wsfc_quorum_disk_size_gb:
      type: integer
      description: "Disk witness size in GB (minimum 512MB)"
      required: false
      depends_on:
      - variable: "wsfc_quorum_type"
        value: "node_and_disk_majority"
      minimum: 1
      default: 1

    # File Share Witness
    wsfc_quorum_file_share_path:
      type: string
      description: "File share witness UNC path"
      required: false
      depends_on:
      - variable: "wsfc_quorum_type"
        value: "node_and_file_share_majority"
      format: unc_path
      example: "\\\\fileserver.corp.Infinite Improbability Corp.com\\witness"

    # Cloud Witness (Azure Storage Account)
    wsfc_quorum_cloud_witness_account:
      type: string
      description: "Azure Storage Account name for cloud witness"
      required: false
      depends_on:
      - variable: "wsfc_quorum_type"
        value: "cloud_witness"
      pattern: "^[a-z0-9]{3,24}$"
      example: "stwsfcprodeus001"

    wsfc_quorum_cloud_witness_key:
      type: string
      description: "Azure Storage Account access key (sensitive)"
      required: false
      depends_on:
      - variable: "wsfc_quorum_type"
        value: "cloud_witness"
      sensitive: true
      pattern: "^keyvault://[a-z0-9-]+/.+$"
      example: "keyvault://kv-wsfc-mgmt/cloud-witness-key"

    wsfc_quorum_cloud_witness_endpoint:
      type: string
      description: "Azure Storage endpoint (for Azure Government or China clouds)"
      required: false
      depends_on:
      - variable: "wsfc_quorum_type"
        value: "cloud_witness"
      format: url
      default: "core.windows.net"
      example: "core.usgovcloudapi.net"

    # ---------------------------------------------------------------------------
    # CLUSTER ROLES AND SERVICES
    # ---------------------------------------------------------------------------
    wsfc_hyperv_role_enabled:
      type: boolean
      description: "Enable Hyper-V role on cluster nodes"
      required: false
      default: false

    # Hyper-V Virtual Switch Configuration (when wsfc_hyperv_role_enabled = true)
    wsfc_virtual_switch_name:
      type: string
      description: "Name of the Hyper-V virtual switch for VM connectivity"
      required: false
      depends_on:
      - variable: "wsfc_hyperv_role_enabled"
        value: true
      pattern: "^[a-zA-Z0-9-_]{1,64}$"
      default: "DefaultSwitch"
      example: "External-vSwitch-01"

    wsfc_virtual_switch_type:
      type: string
      description: "Type of virtual switch (External, Internal, Private)"
      required: false
      depends_on:
      - variable: "wsfc_hyperv_role_enabled"
        value: true
      allowedValues:
      - External
      - Internal
      - Private
      default: "External"

    # Hyper-V Live Migration Configuration
    wsfc_live_migration_enabled:
      type: boolean
      description: "Enable live migration for VMs"
      required: false
      depends_on:
      - variable: "wsfc_hyperv_role_enabled"
        value: true
      default: true

    wsfc_live_migration_auth:
      type: string
      description: "Authentication protocol for live migration (Kerberos recommended for security)"
      required: false
      depends_on:
      - variable: "wsfc_hyperv_role_enabled"
        value: true
      allowedValues:
      - CredSSP
      - Kerberos
      default: "Kerberos"

    wsfc_live_migration_performance:
      type: string
      description: "Network protocol for live migration performance (SMB provides best performance with RDMA)"
      required: false
      depends_on:
      - variable: "wsfc_hyperv_role_enabled"
        value: true
      allowedValues:
      - TCP/IP
      - Compression
      - SMB
      default: "SMB"

    # Hyper-V Advanced Host Settings
    wsfc_numa_spanning:
      type: boolean
      description: "Allow VMs to span multiple NUMA nodes (enable only if workload requires more memory than single NUMA node)"
      required: false
      depends_on:
      - variable: "wsfc_hyperv_role_enabled"
        value: true
      default: false

    wsfc_storage_qos_enabled:
      type: boolean
      description: "Enable Storage Quality of Service for IOPS management"
      required: false
      depends_on:
      - variable: "wsfc_hyperv_role_enabled"
        value: true
      default: true

    wsfc_sofs_role_enabled:
      type: boolean
      description: "Enable Scale-Out File Server (SOFS) role"
      required: false
      default: false

    wsfc_sofs_name:
      type: string
      description: "SOFS cluster role name"
      required: false
      depends_on:
      - variable: "wsfc_sofs_role_enabled"
        value: true
      maxLength: 15
      example: "SOFS01"

    wsfc_sofs_ip:
      type: string
      description: "SOFS IP address"
      required: false
      depends_on:
      - variable: "wsfc_sofs_role_enabled"
        value: true
      format: ipv4
      example: "192.168.211.60"

    # ---------------------------------------------------------------------------
    # CLUSTER HEALTH AND MONITORING
    # ---------------------------------------------------------------------------
    wsfc_health_check_interval:
      type: integer
      description: "Health check interval in seconds (default 60)"
      required: false
      minimum: 10
      maximum: 300
      default: 60

    wsfc_drain_on_shutdown:
      type: boolean
      description: "Automatically drain cluster node roles on shutdown"
      required: false
      default: true

    wsfc_quarantine_enabled:
      type: boolean
      description: "Enable automatic quarantine for misbehaving nodes"
      required: false
      default: true

    wsfc_quarantine_threshold:
      type: integer
      description: "Number of failures before quarantine (default 3)"
      required: false
      minimum: 1
      maximum: 10
      default: 3

    wsfc_cluster_log_level:
      type: integer
      description: "Cluster diagnostic log verbosity (1-5, 3=default)"
      required: false
      minimum: 1
      maximum: 5
      default: 3

    wsfc_cluster_log_size_mb:
      type: integer
      description: "Maximum cluster log file size in MB"
      required: false
      minimum: 8
      maximum: 1024
      default: 300

    # ---------------------------------------------------------------------------
    # SECURITY SETTINGS
    # ---------------------------------------------------------------------------
    wsfc_smb_signing_enforced:
      type: boolean
      description: "Enforce SMB signing for cluster communications"
      required: false
      default: true

    wsfc_smb_encryption_enabled:
      type: boolean
      description: "Enable SMB encryption for CSV traffic (Windows Server 2012 R2+)"
      required: false
      default: false

    wsfc_bitlocker_csv:
      type: boolean
      description: "Enable BitLocker encryption on CSV volumes"
      required: false
      default: false

    wsfc_credential_guard:
      type: boolean
      description: "Enable Credential Guard on cluster nodes (Windows Server 2016+)"
      required: false
      default: false

    # ---------------------------------------------------------------------------
    # PERFORMANCE TUNING
    # ---------------------------------------------------------------------------
    wsfc_same_subnet_delay:
      type: integer
      description: "Heartbeat delay for same subnet in milliseconds (default 1000)"
      required: false
      minimum: 250
      maximum: 5000
      default: 1000

    wsfc_same_subnet_threshold:
      type: integer
      description: "Heartbeat threshold for same subnet (default 10)"
      required: false
      minimum: 3
      maximum: 20
      default: 10

    wsfc_cross_subnet_delay:
      type: integer
      description: "Heartbeat delay for cross subnet in milliseconds (default 1000)"
      required: false
      minimum: 250
      maximum: 5000
      default: 1000

    wsfc_cross_subnet_threshold:
      type: integer
      description: "Heartbeat threshold for cross subnet (default 20)"
      required: false
      minimum: 3
      maximum: 40
      default: 20

    # ---------------------------------------------------------------------------
    # CLUSTER MAINTENANCE
    # ---------------------------------------------------------------------------
    wsfc_cau_enabled:
      type: boolean
      description: "Enable Cluster-Aware Updating (CAU)"
      required: false
      default: false

    wsfc_cau_schedule:
      type: string
      description: "CAU maintenance window schedule (cron format)"
      required: false
      depends_on:
      - variable: "wsfc_cau_enabled"
        value: true
      example: "0 2 * * 0"

    wsfc_cau_max_retries:
      type: integer
      description: "Maximum CAU retry attempts per node"
      required: false
      depends_on:
      - variable: "wsfc_cau_enabled"
        value: true
      minimum: 1
      maximum: 10
      default: 3

    wsfc_cau_max_reboot_time:
      type: integer
      description: "Maximum reboot time in minutes during CAU"
      required: false
      depends_on:
      - variable: "wsfc_cau_enabled"
        value: true
      minimum: 5
      maximum: 120
      default: 30

    # ---------------------------------------------------------------------------
    # INTEGRATION & MANAGEMENT
    # ---------------------------------------------------------------------------
    wsfc_scvmm_managed:
      type: boolean
      description: "Cluster managed by System Center VMM"
      required: false
      default: false

    wsfc_scvmm_server:
      type: string
      description: "SCVMM management server FQDN"
      required: false
      depends_on:
      - variable: "wsfc_scvmm_managed"
        value: true
      format: fqdn
      example: "scvmm.corp.Infinite Improbability Corp.com"

    wsfc_tags:
      type: object
      description: "Custom tags for cluster resources"
      required: false
      additionalProperties:
        type: string
      example:
        environment: "production"
        owner: "infrastructure-team"
        cost_center: "IT-OPS-001"

    # ---------------------------------------------------------------------------
    # CLUSTER NETWORK CONFIGURATION
    # ---------------------------------------------------------------------------
    wsfc_cluster_network_roles:
      type: array
      description: "Network role assignments for cluster networks"
      required: false
      items:
        type: object
        properties:
          network_name:
            type: string
            description: "Name of cluster network"
          role:
            type: string
            description: "Network role"
            allowedValues:
              - ClusterAndClient
              - ClusterOnly
              - None
      example:
        - network_name: "Management"
          role: "ClusterAndClient"
        - network_name: "Storage"
          role: "ClusterOnly"
        - network_name: "Backup"
          role: "None"
      note: "ClusterAndClient = cluster + client traffic, ClusterOnly = cluster heartbeat only, None = excluded from cluster"

# =============================================================================
# CLUSTER NODES (GENERIC - SHARED BY AZURE LOCAL & WSFC)
# =============================================================================
# Generic cluster node configurations used by BOTH Azure Local and Windows
# Server Failover Clustering (WSFC). This is the reusable infrastructure layer
# containing physical hardware specifications, network adapters, and storage
# configurations.
#
# USAGE:
#   - Azure Local clusters: Use these nodes with azure_local: configuration
#   - WSFC clusters: Use these nodes with wsfc: configuration
#
# This follows the recommended architecture where cluster_nodes: is the shared
# infrastructure layer, while azure_local: and wsfc: provide technology-specific
# cluster configuration.

cluster_nodes:
  infrastructure_type: ["azure_local", "wsfc_s2d", "wsfc_san"]
  description: "Array of cluster node configurations (generic, used by both Azure Local and WSFC)"
  type: array
  required: true
  minItems: 1
  maxItems: 16
  items:
    type: object
    required: [node_hostname, node_management_ip, node_idrac_ip]
    properties:
  # -----------------------------------------------------------------------
  # HARDWARE IDENTIFICATION
  # -----------------------------------------------------------------------
      node_hostname:
        type: string
        description: "Node hostname"
        required: true
        maxLength: 15
        example: "azlc-node01"
      
      node_fqdn:
        type: string
        description: "Node fully qualified domain name"
        required: false
        example: "azlc-node01.azlocal.cloud"
      
      node_model:
        type: string
        description: "Node server model"
        required: false
        example: "PowerEdge R750"
      
      node_serial_number:
        type: string
        description: "Node server serial number"
        required: false
        example: "J8KXM73"
      
      node_service_tag:
        type: string
        description: "Node Dell service tag"
        required: false
        example: "J8KXM73"
      
      node_bios_version:
        type: string
        description: "Node BIOS firmware version"
        required: false
        example: "2.4.8"
      
  # -----------------------------------------------------------------------
  # NETWORK CONFIGURATION
  # -----------------------------------------------------------------------
      node_management_ip:
        type: string
        description: "Node management network IP address"
        format: ipv4
        required: true
        example: "192.168.211.21"
      
      node_management_vlan:
        type: integer
        description: "Node management VLAN ID"
        required: false
        minimum: 1
        maximum: 4094
        example: 211
      
      node_idrac_ip:
        type: string
        description: "Node iDRAC/BMC IP address"
        format: ipv4
        required: true
        example: "192.168.215.21"
      
      node_bmc_ip:
        type: string
        description: "Node BMC IP address (alternative name for iDRAC IP)"
        format: ipv4
        required: false
        example: "192.168.215.21"
      
      node_mac_bmc:
        type: string
        description: "Node BMC/iDRAC MAC address"
        format: mac
        required: false
        example: "B0:7B:25:D7:8C:40"
      
      node_mac_port1:
        type: string
        description: "Node port 1 MAC address"
        format: mac
        required: false
        example: "B8:CE:F6:4C:5D:6E"
      
      node_mac_port2:
        type: string
        description: "Node port 2 MAC address"
        format: mac
        required: false
        example: "B8:CE:F6:4C:5D:6F"
      
      node_mac_port3:
        type: string
        description: "Node port 3 MAC address"
        format: mac
        required: false
        example: "B8:CE:F6:4C:5D:70"
      
      node_mac_port4:
        type: string
        description: "Node port 4 MAC address"
        format: mac
        required: false
        example: "B8:CE:F6:4C:5D:71"
      
      node_slot3_port1_mac:
        type: string
        description: "Node slot 3 port 1 MAC address"
        format: mac
        required: false
        example: "B8:CE:F6:4C:5D:72"
      
      node_slot6_port1_mac:
        type: string
        description: "Node slot 6 port 1 MAC address"
        format: mac
        required: false
        example: "B8:CE:F6:73:F2:D0"
      
      node_slot6_port2_mac:
        type: string
        description: "Node slot 6 port 2 MAC address"
        format: mac
        required: false
        example: "B8:CE:F6:73:F2:D1"
      
      node_network_ports:
        type: integer
        description: "Node total number of network ports"
        required: false
        minimum: 1
        maximum: 16
        example: 4
      
  # -----------------------------------------------------------------------
  # CPU SPECIFICATIONS
  # -----------------------------------------------------------------------
      node_cpu:
        type: string
        description: "Node CPU model (short name)"
        required: false
        example: "Intel Xeon Gold 6248"
      
      node_cpu_model:
        type: string
        description: "Node CPU model (detailed string)"
        required: false
        example: "Intel(R) Xeon(R) Gold 6248 CPU @ 2.50GHz"
      
      node_cpu_count:
        type: integer
        description: "Node number of physical CPU sockets"
        required: false
        minimum: 1
        maximum: 4
        example: 2
      
      node_cpu_cores:
        type: integer
        description: "Node cores per CPU socket"
        required: false
        minimum: 1
        maximum: 64
        example: 20
      
      node_cpu_max_clock_mhz:
        type: integer
        description: "Node maximum CPU clock speed in MHz"
        required: false
        minimum: 1000
        maximum: 10000
        example: 3700
      
      node_total_cores:
        type: integer
        description: "Node total physical cores (cpu_count × cpu_cores)"
        required: false
        minimum: 1
        maximum: 256
        example: 40
      
      node_total_logical_procs:
        type: integer
        description: "Node total logical processors (with hyperthreading)"
        required: false
        minimum: 1
        maximum: 512
        example: 80
      
  # -----------------------------------------------------------------------
  # MEMORY SPECIFICATIONS
  # -----------------------------------------------------------------------
      node_memory_type:
        type: string
        description: "Node memory type (DDR4, DDR5)"
        required: false
        allowedValues:
          - "DDR4"
          - "DDR5"
        example: "DDR4"
      
      node_memory_speed_mhz:
        type: integer
        description: "Node memory speed in MHz"
        required: false
        minimum: 1600
        maximum: 8000
        example: 2933
      
      node_memory_gb:
        type: integer
        description: "Node memory per DIMM in GB"
        required: false
        minimum: 4
        maximum: 256
        example: 32
      
      node_total_memory_gb:
        type: integer
        description: "Node total system memory in GB"
        required: false
        minimum: 32
        maximum: 6144
        example: 512
      
  # -----------------------------------------------------------------------
  # STORAGE SPECIFICATIONS
  # -----------------------------------------------------------------------
      node_boot_drive_size_gb:
        type: integer
        description: "Node boot drive size in GB (typically SSD/NVMe)"
        required: false
        minimum: 100
        maximum: 2000
        example: 480
      
      node_data_drive_count:
        type: integer
        description: "Node number of data drives (for Storage Spaces Direct)"
        required: false
        minimum: 0
        maximum: 24
        example: 8
      
      node_data_drive_size_gb:
        type: integer
        description: "Node size of each data drive in GB"
        required: false
        minimum: 100
        maximum: 10000
        example: 1920
      
  # -----------------------------------------------------------------------
  # PHYSICAL LOCATION & CABLING
  # -----------------------------------------------------------------------
      node_rack_position:
        type: string
        description: "Node physical rack location (rack ID and U position)"
        required: false
        example: "RAL-Rack01-U10"
      
      node_cabling_idrac:
        type: string
        description: "Node iDRAC cabling documentation"
        required: false
        example: "Port 1 to Switch A Port 1"
      
      # Hardware Platform Configuration
      hardware_platform:
        type: object
        description: "Node hardware configuration (platform model, adapters, GPUs)"
        required: false
        properties:
          platform_model:
            type: string
            description: "Dell AX platform model"
            required: true
            allowedValues:
              - "AX-4510c"
              - "AX-660"
              - "AX-760"
            example: "AX-760"
          
          # Onboard NICs (AX-660/760 only, typically disabled)
          onboard_nics:
            type: object
            description: "Onboard 1GbE/10GbE NICs (AX-660/760 only)"
            required: false
            properties:
              enabled:
                type: boolean
                description: "Whether onboard NICs are enabled (typically disabled)"
                default: false
              adapters:
                type: array
                description: "Onboard NIC adapter configurations"
                required: false
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: "Adapter name as seen by Windows/ARM template"
                      example: "Embedded LOM 1"
                    mac_address:
                      type: string
                      format: mac
                      description: "Adapter MAC address"
                      example: "AA:BB:CC:DD:EE:01"
                    speed_gbps:
                      type: integer
                      description: "Port speed in Gbps"
                      allowedValues: [1, 10]
                      example: 10
          
          # PCIe Network Adapters (main data path)
          pcie_network_adapters:
            type: array
            description: "PCIe network adapter cards installed in node"
            required: false
            items:
              type: object
              properties:
                slot:
                  type: integer
                  description: "PCIe slot number"
                  minimum: 1
                  maximum: 8
                  example: 2
                vendor:
                  type: string
                  description: "NIC card vendor"
                  allowedValues:
                    - "Mellanox"
                    - "NVIDIA"
                    - "Intel"
                    - "Broadcom"
                  example: "Mellanox"
                model:
                  type: string
                  description: "NIC card model"
                  example: "ConnectX-6 Dx"
                ports:
                  type: array
                  description: "Physical ports on this NIC card"
                  minItems: 1
                  maxItems: 4
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: "Port name as seen by Windows/ARM template (Mellanox: 'Slot X Port Y', Intel: 'Embedded NIC X')"
                        example: "Slot 2 Port 1"
                      mac_address:
                        type: string
                        format: mac
                        description: "Port MAC address"
                        example: "B8:CE:F6:4C:5D:6E"
                      speed_gbps:
                        type: integer
                        description: "Port speed in Gbps"
                        allowedValues: [10, 25, 40, 50, 100, 200]
                        example: 25
                      rdma_capable:
                        type: boolean
                        description: "Whether port supports RDMA"
                        default: true
                      rdma_technology:
                        type: string
                        description: "RDMA technology (if rdma_capable)"
                        allowedValues:
                          - "RoCEv2"
                          - "iWARP"
                          - "InfiniBand"
                        example: "RoCEv2"
      
  # PCIe GPU Accelerators (optional)
          pcie_gpus:
            type: array
            description: "PCIe GPU accelerator cards installed in node"
            required: false
            items:
              type: object
              properties:
                slot:
                  type: integer
                  description: "PCIe slot number"
                  minimum: 1
                  maximum: 8
                  example: 5
                vendor:
                  type: string
                  description: "GPU vendor"
                  allowedValues:
                    - "NVIDIA"
                    - "AMD"
                  example: "NVIDIA"
                model:
                  type: string
                  description: "GPU model"
                  example: "A40"
                memory_gb:
                  type: integer
                  description: "GPU memory in GB"
                  example: 48
                partition_capable:
                  type: boolean
                  description: "Whether GPU supports partitioning (vGPU or MIG)"
                  default: false
                partition_type:
                  type: string
                  description: "GPU partition technology"
                  allowedValues:
                    - "vGPU"
                    - "MIG"
                    - "none"
                  example: "vGPU"
                vgpu_profiles:
                  type: array
                  description: "Available vGPU profiles (if partition_type is vGPU)"
                  required: false
                  items:
                    type: string
                  example: ["A40-1Q", "A40-2Q", "A40-4Q", "A40-8Q", "A40-12Q", "A40-24Q"]
                mig_profiles:
                  type: array
                  description: "Available MIG profiles (if partition_type is MIG)"
                  required: false
                  items:
                    type: string
                  example: ["1g.10gb", "2g.20gb", "3g.40gb"]

# =============================================================================
# CLUSTER ARM DEPLOYMENT
# =============================================================================

cluster_arm_deployment:
  infrastructure_type: ["azure_local"]
  arm_key_vault_name:
    type: string
    description: "Key Vault name for ARM deployment"
    required: false
    minLength: 3
    maxLength: 24
    pattern: "^[a-z][a-z0-9]+(-[a-z0-9]+)*$"
    note: "No consecutive hyphens allowed"
    example: "kv-azlc-mgmt"

  arm_logs_retention_days:
    type: integer
    description: "Logs retention days"
    required: false
    minimum: 30
    maximum: 730
    default: 90

  arm_cluster_name:
    type: string
    description: "Cluster name for ARM deployment"
    required: false
    maxLength: 15
    pattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
    example: "azlc-clus01"

  arm_witness_type:
    type: string
    description: "Witness type"
    required: false
    allowedValues:
      - cloud_witness
      - file_share_witness
      - disk_witness
    default: "cloud_witness"

  arm_domain_fqdn:
    type: string
    description: "Domain FQDN"
    required: false
    example: "azlocal.cloud"

  arm_ou_path:
    type: string
    description: "OU path"
    required: false
    example: "OU=AzureLocal,DC=azlocal,DC=cloud"

  arm_naming_prefix:
    type: string
    description: "Naming prefix"
    required: false
    maxLength: 8
    pattern: "^[a-z0-9-]+$"
    example: "azlc"

  arm_subnet_mask:
    type: string
    description: "Subnet mask"
    required: false
    format: ipv4
    example: "255.255.255.0"

  arm_default_gateway:
    type: string
    description: "Default gateway"
    required: false
    format: ipv4
    example: "192.168.211.1"

  arm_starting_ip:
    type: string
    description: "Starting IP address"
    required: false
    format: ipv4
    example: "192.168.211.20"

  arm_ending_ip:
    type: string
    description: "Ending IP address"
    required: false
    format: ipv4
    example: "192.168.211.25"

  arm_service_principal_app_id:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "ARM deployment service principal app ID (Azure Local cluster deployments)"
    required: false
    format: uuid
    example: "00000000-aaaa-bbbb-cccc-333333333333"

  arm_service_principal_object_id:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "ARM deployment service principal object ID (Azure Local cluster deployments)"
    required: false
    format: uuid
    example: "12345678-1234-1234-1234-123456789012"

  arm_service_principal_secret_ref:
    category: "identity"
    subcategory: "service-principal"
    type: string
    description: "ARM deployment service principal secret reference (Azure Local cluster deployments)"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-mgmt/spn-client-secret"

  arm_resource_provider_object_id:
    type: string
    description: "Resource provider object ID"
    required: false
    format: uuid
    example: "12345678-1234-1234-1234-123456789012"

  arm_mode:
    type: string
    description: "ARM template deployment mode (validate_only: validate config without deploying, deploy: actual deployment)"
    required: false
    allowedValues:
      - validate_only
      - deploy
    default: "deploy"

  arm_storage_configuration_mode:
    type: string
    description: "Storage configuration mode in ARM template (express: automated storage config, advanced: manual storage config)"
    required: false
    allowedValues:
      - express
      - advanced
    default: "express"

  # ---------------------------------------------------------------------------
  # AZURE ARC INTEGRATION
  # ---------------------------------------------------------------------------
  arc_node_resource_ids:
    type: array
    description: "Azure Arc resource IDs for cluster nodes (Arc machines that are part of the cluster) - ARM template parameter"
    required: false
    items:
