    type: integer
    description: "Out-of-band VLAN ID (iDRACs, switches, firewalls, OpenGear)"
    required: true
    minimum: 1
    maximum: 4094
    example: 210

  vlan_oob_name:
    type: string
    description: "Out-of-band VLAN name"
    required: true
    example: "oob"

  vlan_oob_cidr:
    type: string
    description: "Out-of-band VLAN CIDR"
    required: true
    format: cidr
    example: "192.168.210.0/24"

  vlan_oob_gateway:
    type: string
    description: "Out-of-band VLAN gateway"
    required: true
    format: ipv4
    example: "192.168.210.1"

  # STORAGE VLANS (1-4, Non-Routable, East/West Traffic Only)
  # ---------------------------------------------------------------------------
  vlan_storage_networks:
    type: array
    description: "Storage VLANs for Azure Local cluster (non-routable, east/west traffic only)"
    required: false
    minItems: 1
    maxItems: 4
    items:
      type: object
      properties:
        vlan_id:
          type: integer
          minimum: 1
          maximum: 4094
        name:
          type: string
        cidr:
          type: string
          format: cidr
        routable:
          type: boolean
          default: false
    example:
    - vlan_id: 712
      name: "storage-1"
      cidr: "10.71.212.0/24"
      routable: false
    - vlan_id: 713
      name: "storage-2"
      cidr: "10.71.213.0/24"
      routable: false

  vlan_storage_1_id:
    type: integer
    description: "Storage VLAN 1 ID (non-routable)"
    required: false
    minimum: 1
    maximum: 4094
    example: 712

  vlan_storage_1_name:
    type: string
    description: "Storage VLAN 1 name"
    required: false
    example: "storage-1"

  vlan_storage_1_cidr:
    type: string
    description: "Storage VLAN 1 CIDR (non-routable, east/west only)"
    required: false
    format: cidr
    example: "10.71.212.0/24"

  vlan_storage_2_id:
    type: integer
    description: "Storage VLAN 2 ID (non-routable)"
    required: false
    minimum: 1
    maximum: 4094
    example: 713

  vlan_storage_2_name:
    type: string
    description: "Storage VLAN 2 name"
    required: false
    example: "storage-2"

  vlan_storage_2_cidr:
    type: string
    description: "Storage VLAN 2 CIDR (non-routable, east/west only)"
    required: false
    format: cidr
    example: "10.71.213.0/24"

  vlan_storage_3_id:
    type: integer
    description: "Storage VLAN 3 ID (non-routable)"
    required: false
    minimum: 1
    maximum: 4094
    example: 714

  vlan_storage_3_name:
    type: string
    description: "Storage VLAN 3 name"
    required: false
    example: "storage-3"

  vlan_storage_3_cidr:
    type: string
    description: "Storage VLAN 3 CIDR (non-routable, east/west only)"
    required: false
    format: cidr
    example: "10.71.214.0/24"

  vlan_storage_4_id:
    type: integer
    description: "Storage VLAN 4 ID (non-routable)"
    required: false
    minimum: 1
    maximum: 4094
    example: 715

  vlan_storage_4_name:
    type: string
    description: "Storage VLAN 4 name"
    required: false
    example: "storage-4"

  vlan_storage_4_cidr:
    type: string
    description: "Storage VLAN 4 CIDR (non-routable, east/west only)"
    required: false
    format: cidr
    example: "10.71.215.0/24"

  # WORKLOAD NETWORKS (Customer Workloads, Up to 6 Networks)
  # ---------------------------------------------------------------------------
  vlan_workload_networks:
    type: array
    description: "Workload VLANs for customer workloads (up to 6 networks)"
    required: false
    minItems: 0
    maxItems: 6
    items:
      type: object
      properties:
        vlan_id:
          type: integer
          minimum: 1
          maximum: 4094
        name:
