      - "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-iic-eus-landingzone-cluster/providers/Microsoft.HybridCompute/machines/azlc-node02"

  arm_cluster_telemetry_setting:
