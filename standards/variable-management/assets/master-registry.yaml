storage:
  storage_name:
    type: string
    description: "Storage account name"
    required: false
    minLength: 3
    maxLength: 24
    pattern: "^[a-z0-9]+$"
    example: "stazlciiceus001"

  storage_tier:
    type: string
    description: "Storage account tier"
    required: false
    allowedValues:
    - Standard
    - Premium
    default: "Standard"

  storage_replication_type:
