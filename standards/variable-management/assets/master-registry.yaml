# =============================================================================
# AZURE TENANTS & CONFIGURATION
# =============================================================================

azure_tenants:
  # Primary Tenant - Azure Local Cloud
  aztenant_azurelocal_id:
    category: "identity"
    subcategory: "tenant"
    type: string
    description: "Azure AD/Entra ID Tenant ID (GUID)"
    required: true
    format: uuid
    example: "00000000-aaaa-bbbb-cccc-111111111111"

  aztenant_azurelocal_name:
    category: "identity"
    subcategory: "tenant"
    type: string
    description: "Azure tenant display name"
    required: true
    example: "Azure Local Cloud"

  aztenant_azurelocal_domain:
    category: "identity"
    subcategory: "tenant"
    type: string
    description: "Azure tenant domain"
    required: true
    pattern: "^[a-z0-9-]+\\.onmicrosoft\\.com$"
    example: "azurelocalcloud.onmicrosoft.com"

  aztenant_azurelocal_primary_domain:
    type: string
    description: "Primary custom domain"
    required: true
    example: "azurelocal.cloud"

  aztenant_region:
    category: "identity"
    subcategory: "region"
    type: string
    description: "Azure region code"
    required: true
    example: "eastus"

  aztenant_environment:
    type: string
    description: "Azure cloud environment"
    required: false
    allowedValues:
    - AzureCloud
    - AzureUSGovernment
    - AzureChinaCloud
    default: "AzureCloud"

  aztenant_location:
    category: "identity"
    subcategory: "region"
    type: string
    description: "Azure region (full name)"
    required: true
    allowedValues:
    - eastus
    - eastus2
    - westus
    - westus2
    - centralus
    - northeurope
    - westeurope
    example: "eastus"

  aztenant_location_short:
    type: string
    description: "Azure region (short form)"
    required: true
    pattern: "^[a-z]{2,5}[0-9]?$"
    example: "eus"

  # Tenant: Infinite Improbability Corp
  aztenant_iic_production_id:
    type: string
    description: "Infinite Improbability Corp Tenant ID"
    required: false
    format: uuid
    example: "c9257f80-1ad6-40b4-8f53-f3d58b75d58b"

  aztenant_iic_production_domain:
    type: string
    description: "Infinite Improbability Corp tenant domain"
    required: false
    example: "iicproduction.onmicrosoft.com"

  aztenant_iic_production_primary_domain:
    type: string
    description: "Infinite Improbability Corp primary domain"
    required: false
    example: "improbability.cloud"

  # Tenant: IIC Demos
  aztenant_iic-reference_id:
    type: string
    description: "IIC Demos Tenant ID"
    required: false
    format: uuid
    example: "12345678-1234-1234-1234-123456789012"

  aztenant_iic-reference_domain:
    type: string
    description: "IIC Demos tenant domain"
    required: false
    example: "iic-reference.onmicrosoft.com"

  aztenant_iic-reference_primary_domain:
    type: string
    description: "IIC Demos primary domain"
    required: false
    example: "iic-reference.cloud"

  # Tenant: IIC POC
  aztenant_iic-poc_id:
    type: string
    description: "IIC POC Tenant ID"
    required: false
    format: uuid
    example: "12345678-1234-1234-1234-123456789013"

  aztenant_iic-poc_domain:
    type: string
    description: "IIC POC tenant domain"
    required: false
    example: "iic-poc.onmicrosoft.com"

  aztenant_iic-poc_primary_domain:
    type: string
    description: "IIC POC primary domain"
    required: false
    example: "iic-poc.cloud"

  # Tenant: IIC Product Labs
  aztenant_iic-productlabs_id:
    type: string
    description: "IIC Product Labs Tenant ID"
    required: false
    format: uuid
    example: "12345678-1234-1234-1234-123456789014"

  aztenant_iic-productlabs_domain:
    type: string
    description: "IIC Product Labs tenant domain"
    required: false
    example: "iic-productlabs.onmicrosoft.com"

  aztenant_iic-productlabs_primary_domain:
    type: string
    description: "IIC Product Labs primary domain"
    required: false
    example: "iic-productlabs.cloud"

