# =============================================================================
# Master Variable Registry - Infinite Improbability Cloud Management Platform
# =============================================================================
# This file defines ALL variable names, types, and descriptions used across
# the Infinite Improbability Cloud Management Platform (IIC-CMP) and all
# Azure Local environment repositories. Environments reference these definitions
# to ensure consistency. Actual VALUES are stored in each environment's
# infrastructure.yml file.
#
# Purpose:
#   - Single source of truth for variable naming across all environments
#   - Ensures variable X in iic-production is the same as variable X in Demos/POC/Labs
#   - Self-documenting with descriptions, examples, and constraints
#   - Enables validation via JSON Schema (schemas/infrastructure.schema.json)
#
# Usage:
#   - When creating a new environment, reference variables from this registry
#   - If a variable doesn't exist, add it here first with proper documentation
#   - Values go in each environment's infrastructure.yml, not here
#
# Environments:
#   - Azure Local Cloud (management hub tenant)
#   - iic-production (2-node switchless home lab)
#   - iic-reference (portable 2-node demo cluster with GPU)
#   - iic-poc (nested virtualization proof-of-concept)
#   - iic-productlabs (4-node datacenter lab)
#
# Statistics:
#   - Total Variables: 970+
#   - Last Updated: 2026-02-01
#   - Version: 2.2.0
# =============================================================================

