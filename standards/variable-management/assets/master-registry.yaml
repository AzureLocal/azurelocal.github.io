# =============================================================================
# B2B CROSS-TENANT SYNCHRONIZATION
# =============================================================================
# Cross-tenant synchronization (CTS) configuration for IIC managed services.
# Enables IIC engineers to access customer Azure tenants via B2B collaboration.
#
# RELATED SECTIONS:
#   - azure_tenants: (line 390+) - Tenant ID definitions
#   - accounts: Service principal and user accounts
#   - active_directory: AD integration for hybrid identity
#
# USAGE:
#   - Stage 00 B2B Configuration: Configure CTS between IIC MGMT and customer tenant
#   - Scripts: 02-iic-cicd-infra/powershell/Configure-*.ps1

b2b_configuration:
  # ---------------------------------------------------------------------------
  # TIERPOINT MANAGEMENT TENANT (Source Tenant)
  # ---------------------------------------------------------------------------
  iic_mgmt:
    b2b_iic_mgmt_tenant_id:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "IIC MGMT tenant ID (source tenant for cross-tenant sync)"
      required: true
      format: uuid
      example: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    
    b2b_iic_mgmt_display_name:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "IIC MGMT tenant display name"
      required: true
      example: "IIC MGMT"
    
    b2b_iic_mgmt_primary_domain:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "IIC MGMT tenant primary domain"
      required: true
      pattern: "^[a-z0-9-]+\\.onmicrosoft\\.com$"
      example: "iic-mgmt.onmicrosoft.com"

  # ---------------------------------------------------------------------------
  # TARGET TENANT (Customer/Destination Tenant)
  # ---------------------------------------------------------------------------
  target_tenant:
    b2b_target_tenant_id:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "Target (customer) tenant ID for cross-tenant sync"
      required: true
      format: uuid
      example: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    
    b2b_target_display_name:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "Target tenant display name"
      required: true
      example: "Customer Production"
    
    b2b_target_primary_domain:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "Target tenant primary domain"
      required: true
      pattern: "^[a-z0-9-]+\\.onmicrosoft\\.com$"
      example: "customer.onmicrosoft.com"

  # ---------------------------------------------------------------------------
  # SERVICE TIER CONFIGURATION
  # ---------------------------------------------------------------------------
  service_configuration:
    b2b_service_tier:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "Service tier purchased by customer (determines which groups are synced)"
      required: true
      allowedValues:
        - Professional
        - Premium
      default: "Professional"
      example: "Professional"
    
    b2b_additional_services:
      category: "identity"
      subcategory: "b2b-configuration"
      type: array
      description: "Additional services purchased beyond base tier"
      required: false
      items:
        type: string
      allowedValues:
        - SOC
        - AES
      example: ["SOC"]

  # ---------------------------------------------------------------------------
  # CROSS-TENANT SYNC TEMPLATE
  # ---------------------------------------------------------------------------
  cts_configuration:
    b2b_cts_template_id:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "Cross-tenant synchronization template ID (Azure2Azure template)"
      required: true
      format: uuid
      default: "518e5f48-1fc8-4c48-9387-9fdf28b0dfe7"
      example: "518e5f48-1fc8-4c48-9387-9fdf28b0dfe7"
      note: "Default Azure2Azure CTS template ID from Microsoft"

  # ---------------------------------------------------------------------------
  # SERVICE TIER GROUPS (Source Groups in IIC MGMT)
  # ---------------------------------------------------------------------------
  service_tier_groups:
    b2b_source_groups_professional:
      category: "identity"
      subcategory: "b2b-configuration"
      type: array
      description: "IIC MGMT groups synced for Professional tier"
      required: false
      items:
        type: string
      example:
        - "Public Cloud Services"
        - "Public Cloud Support"
        - "Public Cloud Implementation Engineering"
    
    b2b_source_groups_premium:
      category: "identity"
      subcategory: "b2b-configuration"
      type: array
      description: "IIC MGMT groups synced for Premium tier (includes Professional + Premium)"
      required: false
      items:
        type: string
      example:
        - "Public Cloud Services"
        - "Public Cloud Support"
        - "Public Cloud Implementation Engineering"
        - "Public Cloud Premium"
    
    b2b_source_groups_admins:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "IIC tenant group for admin-level sync (highest access)"
      required: false
      example: "TRP-ENG-PCS-L3"
    
    b2b_source_groups_contributors:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "IIC tenant group for contributor-level sync"
      required: false
      example: "TRP-ENG-PCS-L2"
    
    b2b_source_groups_readers:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "IIC tenant group for reader-level sync"
      required: false
      example: "TRP-ENG-PCS"
    
    b2b_source_groups_premium_team:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "IIC tenant group for premium services team sync"
      required: false
      example: "TRP-ENG-PCS-PREMIUM"
      note: "Single group reference - see b2b_source_groups_premium for array of Premium tier groups"

  # ---------------------------------------------------------------------------
  # ADDITIONAL SERVICE GROUPS
  # ---------------------------------------------------------------------------
  additional_service_groups:
    b2b_additional_service_groups_soc:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "IIC group for SOC services"
      required: false
      example: "SOC"
    
    b2b_additional_service_groups_aes:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "IIC group for Advanced Engineering Services"
      required: false
      example: "SEC-SD Advanced Services"

  # ---------------------------------------------------------------------------
  # CUSTOMER TENANT GROUPS (Target Groups)
  # ---------------------------------------------------------------------------
  customer_groups:
    b2b_bootstrap_group_name:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "Customer tenant bootstrap group (standard security group)"
      required: false
      default: "iic"
      example: "iic"
      note: "Initial group for IIC access before tiered groups are created"
    
    b2b_tiered_groups_admins:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "Customer tenant admin group (role-assignable)"
      required: false
      example: "tp-b2b-env-admins"
      note: "Created with IsAssignableToRole:true for Entra directory role assignment"
    
    b2b_tiered_groups_contributors:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "Customer tenant contributor group (role-assignable)"
      required: false
      example: "tp-b2b-env-contributors"
    
    b2b_tiered_groups_readers:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "Customer tenant reader group (role-assignable)"
      required: false
      example: "tp-b2b-env-readers"

  # ---------------------------------------------------------------------------
  # SERVICE PRINCIPAL CONFIGURATION
  # ---------------------------------------------------------------------------
  service_principal:
    b2b_service_principal_name:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "Service principal name for CI/CD automation in customer tenant"
      required: false
      example: "iic-cicd"
    
    b2b_source_domain:
      category: "identity"
      subcategory: "b2b-configuration"
      type: string
      description: "Domain pattern for synced users (appears in UPN suffix)"
      required: false
      example: "azurelocalcloud.com"

  # ---------------------------------------------------------------------------
  # TRUST SETTINGS
  # ---------------------------------------------------------------------------
  trust_settings:
    b2b_trust_accept_mfa:
      category: "identity"
      subcategory: "b2b-configuration"
      type: boolean
      description: "Accept MFA claims from source tenant"
      required: false
      default: true
    
    b2b_trust_accept_compliant_devices:
      category: "identity"
      subcategory: "b2b-configuration"
      type: boolean
      description: "Accept compliant device claims from source tenant"
      required: false
      default: true
    
    b2b_trust_accept_hybrid_joined_devices:
      category: "identity"
      subcategory: "b2b-configuration"
      type: boolean
      description: "Accept hybrid Azure AD joined device claims from source tenant"
      required: false
      default: true
    
    b2b_trust_auto_redeem_invitations:
      category: "identity"
      subcategory: "b2b-configuration"
      type: boolean
      description: "Automatically redeem invitations for seamless access"
      required: false
      default: true

# =============================================================================
# GITLAB CI/CD CONFIGURATION
# =============================================================================
# GitLab CI/CD configuration for automated deployments.
#
# RELATED SECTIONS:
#   - service_principals: Azure service principal for GitLab runners
#   - keyvault: Secret storage for GitLab variables

gitlab:
  gitlab_project_id:
    category: "automation"
    subcategory: "gitlab"
    type: integer
    description: "GitLab project ID for the deployment repository"
    required: false
    example: 12345
  
  gitlab_project_path:
    category: "automation"
    subcategory: "gitlab"
    type: string
    description: "GitLab project path (group/project)"
    required: false
    example: "iic/azl-deployments"
  
  gitlab_runner_token:
    category: "automation"
    subcategory: "gitlab"
    type: string
    description: "GitLab runner registration token (Key Vault reference)"
    required: false
    sensitive: true
    pattern: "^keyvault://[a-z0-9-]+/.+$"
    example: "keyvault://kv-azlc-iic-secrets/gitlab-runner-token"
  
  gitlab_environment_name:
    category: "automation"
    subcategory: "gitlab"
    type: string
    description: "GitLab environment name for deployments"
    required: false
    example: "production"

