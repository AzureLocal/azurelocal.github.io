    required: false
    minLength: 3
    maxLength: 24
    pattern: "^[a-z0-9]+$"
    example: "stazlciiceuswitness"

  witness_storage_resource_group:
    type: string
    description: "Resource group for witness storage account"
    required: false
    pattern: "^rg-[a-z0-9-]+$"
    example: "rg-azlc-iic-eus-management-witness"

  witness_storage_sku:
    type: string
    description: "Cloud witness storage account SKU"
    required: false
    allowedValues:
    - Standard_LRS
    - Standard_GRS
    - Standard_RAGRS
    default: "Standard_LRS"

  witness_storage_tier:
    type: string
    description: "Cloud witness storage account access tier"
    required: false
    allowedValues:
    - Hot
    - Cool
    default: "Hot"

  # Diagnostics Storage Account
  storage_diagnostics_name:
    type: string
    description: "Diagnostics storage account name for logs and metrics"
    required: false
    minLength: 3
    maxLength: 24
    pattern: "^[a-z0-9]+$"
    example: "stazlciiceusdiag"

  diagnostics_storage_resource_group:
    type: string
    description: "Resource group for diagnostics storage account"
    required: false
    pattern: "^rg-[a-z0-9-]+$"
