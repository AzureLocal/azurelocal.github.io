    azure_vm_wac_os_disk_size_gb:
      type: integer
      description: "WAC OS disk size (GB)"
      required: true
      default: 128
    
    azure_vm_wac_os_disk_type:
      type: string
      description: "WAC OS disk type"
      required: true
      default: "Premium_LRS"

  # LIGHTHOUSE SERVER (Linux - Azure Lighthouse Management)
  # ---------------------------------------------------------------------------
  lighthouse:
    azure_vm_lighthouse_vm_name:
      type: string
      description: "Lighthouse Azure VM resource name"
      required: true
      example: "vm-azlc-iic-eus-lighthouse"
    
    azure_vm_lighthouse_computer_name:
      type: string
      description: "Lighthouse Linux hostname"
      required: true
      maxLength: 64
      example: "lighthouse"
    
    azure_vm_lighthouse_vm_size:
      type: string
      description: "Lighthouse VM size"
      required: true
      example: "Standard_B2s"
    
    azure_vm_lighthouse_image_publisher:
      type: string
      description: "Lighthouse image publisher"
      required: true
      default: "Canonical"
    
    azure_vm_lighthouse_image_offer:
      type: string
      description: "Lighthouse image offer"
      required: true
      default: "0001-com-ubuntu-server-jammy"
    
    azure_vm_lighthouse_image_sku:
      type: string
      description: "Lighthouse image SKU"
      required: true
      default: "22_04-lts-gen2"
    
    azure_vm_lighthouse_image_version:
      type: string
      description: "Lighthouse image version"
      required: true
      default: "latest"
    
    azure_vm_lighthouse_private_ip:
      type: string
      description: "Lighthouse private IP address"
      required: true
      format: ipv4
      example: "10.100.1.60"
    
    azure_vm_lighthouse_subnet:
      type: string
      description: "Lighthouse subnet name"
      required: true
      example: "snet-azlc-iic-eus-management"
    
    azure_vm_lighthouse_os_disk_size_gb:
      type: integer
      description: "Lighthouse OS disk size (GB)"
      required: true
      default: 64
    
    azure_vm_lighthouse_os_disk_type:
      type: string
      description: "Lighthouse OS disk type"
      required: true
      default: "StandardSSD_LRS"

  # SYSLOG/SNMP SERVER (Linux)
  # ---------------------------------------------------------------------------
  syslog:
    azure_vm_syslog_vm_name:
      type: string
      description: "Syslog Azure VM resource name"
      required: true
      example: "vm-azlc-iic-eus-syslog"
    
    azure_vm_syslog_computer_name:
      type: string
      description: "Syslog Linux hostname"
      required: true
      maxLength: 64
      example: "syslog"
    
    azure_vm_syslog_vm_size:
      type: string
      description: "Syslog VM size"
      required: true
      example: "Standard_B2s"
    
