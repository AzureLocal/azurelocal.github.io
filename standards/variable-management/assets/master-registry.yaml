    kv_azl_ad_domain_admin_username:
      type: string
      description: "Active Directory domain administrator username"
      required: false
      example: "domainadmin@azlocal.mgmt"

    kv_azl_ad_domain_admin_password:
      type: string
      description: "Active Directory domain administrator password (Key Vault secret name)"
      required: false
      sensitive: true
      example: "DomainAdminPassword"

    kv_azl_arbdeployment_spn_value:
