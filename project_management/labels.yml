# =============================================================================
# AzureLocal — Master Label Definitions
# =============================================================================
# Synced to all repos via EndBug/label-sync or manual application.
# Source of truth: azurelocalcloud-azurelocal.github.io/project_management/labels.yml
# =============================================================================

# ---------------------------------------------------------------------------
# Type labels (mutually exclusive — what kind of work)
# ---------------------------------------------------------------------------
- name: type/feature
  color: "0E8A16"
  description: New feature or capability

- name: type/bug
  color: "D73A4A"
  description: Something isn't working

- name: type/docs
  color: "0075CA"
  description: Documentation only

- name: type/infra
  color: "5319E7"
  description: CI/CD, workflows, repo config

- name: type/refactor
  color: "FBCA04"
  description: Code improvement, no behavior change

- name: type/security
  color: "B60205"
  description: Security fix or hardening

- name: type/question
  color: "D876E3"
  description: Question or discussion

# ---------------------------------------------------------------------------
# Solution labels (which repo/area)
# ---------------------------------------------------------------------------
- name: solution/sofs
  color: "1D76DB"
  description: SOFS / FSLogix

- name: solution/avd
  color: "1D76DB"
  description: Azure Virtual Desktop

- name: solution/loadtools
  color: "1D76DB"
  description: Load & performance testing

- name: solution/vmconvert
  color: "1D76DB"
  description: VM conversion toolkit

- name: solution/docs-site
  color: "1D76DB"
  description: Docusaurus docs site

- name: solution/workspace
  color: "1D76DB"
  description: Cross-repo / org-wide

# ---------------------------------------------------------------------------
# Priority labels
# ---------------------------------------------------------------------------
- name: priority/critical
  color: "B60205"
  description: Must fix immediately

- name: priority/high
  color: "D93F0B"
  description: Next sprint

- name: priority/medium
  color: "FBCA04"
  description: Planned

- name: priority/low
  color: "0E8A16"
  description: Nice to have

# ---------------------------------------------------------------------------
# Status labels (supplementary — project board is primary)
# ---------------------------------------------------------------------------
- name: status/blocked
  color: "E4E669"
  description: Blocked by dependency

- name: status/needs-info
  color: "E4E669"
  description: Waiting for more information

- name: status/wontfix
  color: "FFFFFF"
  description: Declined

# ---------------------------------------------------------------------------
# Release-please labels (conventional commit → CHANGELOG mapping)
# ---------------------------------------------------------------------------
- name: feat
  color: "0E8A16"
  description: "Maps to Features in CHANGELOG"

- name: fix
  color: "D73A4A"
  description: "Maps to Bug Fixes in CHANGELOG"

- name: docs
  color: "0075CA"
  description: "Maps to Documentation in CHANGELOG"

- name: infra
  color: "5319E7"
  description: "Maps to Infrastructure in CHANGELOG"

- name: chore
  color: "EDEDED"
  description: "Maps to Miscellaneous in CHANGELOG"
